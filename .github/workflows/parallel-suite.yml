name: Parallel Full Suite — Core Regression (848 TCs)

# ============================================================
# PARALLEL FULL SUITE — 9 Groups Running Simultaneously
# (Connection + SLD excluded — hidden/deprecated in May 2026)
# ============================================================
#
# Architecture:
#   Phase 1: 9 parallel jobs (one per group) via strategy.matrix
#   Phase 2: Summary job aggregates results from all groups
#
# Performance:
#   Sequential (full-suite.yml): ~4-4.5 hours (groups run one after another)
#   Parallel  (this workflow):   ~1-1.5 hours (groups run simultaneously)
#   Speedup: ~3-4x
#
# Groups (9 parallel jobs):
#   Group  1: Auth + Site                 ( 56 TCs)  ~15 min  (Connection hidden in May 2026)
#   Group  2: Location + Task             (135 TCs)  ~30 min
#   Group  3: Work Order + Issue          (234 TCs)  ~55 min  [bottleneck]
#   Group  4: Asset Parts 1-2             ( 69 TCs)  ~20 min
#   Group  5: Asset Part 3               ( 76 TCs)  ~20 min
#   Group  6: Asset Part 4               ( 65 TCs)  ~20 min
#   Group  7: Asset Part 5               ( 76 TCs)  ~20 min
#   Group  8: Dashboard + BugHunt        (105 TCs)  ~30 min
#   Group  9: Work Order Planning        ( 32 TCs)  ~12 min  (OPERATIONS, /planning)
# Excluded (modules deprecated/hidden in May 2026): Connection (74 TCs), SLD (71 TCs)
#
# Moved to parallel-suite-2.yml:
#   Smoke Suites, Load + API + Critical Path, AI Form, Monkey, Visual, AI Analyzer
#
# Cost: Uses ~4-6 runner-hours total (vs 4h sequential).
#       Wall-clock time drops from ~4h to ~1h.
#
# Dashboard: Reuses .github/scripts/full-suite-dashboard.sh (same as full-suite.yml)
#            Each parallel job runs with FULL_SUITE_GROUP=<group-key>.
#            Per-test progress, collapsed raw output — identical clean UI.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      # ── Module groups: checkboxes — tick the ones you want, untick to skip.
      #    All default ON, so a plain "Run workflow" runs everything (as before).
      #    Only the ticked modules spin up runners (built into a dynamic matrix). ──
      auth_site:
        description: 'Auth + Site (login, site selection)'
        type: boolean
        default: true
      location_task:
        description: 'Location + Task'
        type: boolean
        default: true
      work_orders:
        description: 'Work Orders — Work Order + Issue + Planning'
        type: boolean
        default: true
      asset_1_2:
        description: 'Assets — Parts 1-2'
        type: boolean
        default: true
      asset_3:
        description: 'Assets — Part 3'
        type: boolean
        default: true
      asset_4:
        description: 'Assets — Part 4'
        type: boolean
        default: true
      asset_5:
        description: 'Assets — Part 5'
        type: boolean
        default: true
      dashboard_bughunt:
        description: 'Dashboard + BugHunt'
        type: boolean
        default: true
      sales:
        description: 'Sales — Opportunities + Accounts + Goals'
        type: boolean
        default: true
      # ── Delivery. ──
      send_email:
        description: 'Send email report after completion'
        type: boolean
        default: true

# Concurrency: allow only one parallel suite at a time.
# cancel-in-progress: false — a new run queues instead of killing the active one.
# (Previous setting was 'true', which cancelled 9/10 groups mid-run.)
concurrency:
  group: parallel-suite
  cancel-in-progress: false

# The summary job commits the dated failed-tests suite back to main.
permissions:
  contents: write

jobs:
  # ============================================================
  # Phase 0: Build the run-matrix from the selected module checkboxes.
  # Each checkbox maps to one or more matrix groups; only ticked ones run.
  # ============================================================
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      any: ${{ steps.build.outputs.any }}
    steps:
      - name: Build dynamic matrix from selected modules
        id: build
        env:
          AUTH_SITE: ${{ inputs.auth_site }}
          LOCATION_TASK: ${{ inputs.location_task }}
          WORK_ORDERS: ${{ inputs.work_orders }}
          ASSET_1_2: ${{ inputs.asset_1_2 }}
          ASSET_3: ${{ inputs.asset_3 }}
          ASSET_4: ${{ inputs.asset_4 }}
          ASSET_5: ${{ inputs.asset_5 }}
          DASHBOARD_BUGHUNT: ${{ inputs.dashboard_bughunt }}
          SALES: ${{ inputs.sales }}
        run: |
          # Catalog of all groups; each tagged with the checkbox (toggle) that enables it.
          # Merged checkboxes (work_orders, sales) map to >1 group; asset phases are individual.
          CATALOG='[
            {"toggle":"AUTH_SITE","group":"auth-site","name":"Auth + Site","xml":"suite-auth-site.xml","tests":56,"stagger":0},
            {"toggle":"LOCATION_TASK","group":"location-task","name":"Location + Task","xml":"suite-location-task.xml","tests":135,"stagger":10},
            {"toggle":"WORK_ORDERS","group":"workorder-issue","name":"Work Order + Issue","xml":"suite-workorder-issue.xml","tests":238,"stagger":20},
            {"toggle":"WORK_ORDERS","group":"workorder-issue-add","name":"Work Order — Add Issue","xml":"suite-workorder-issue-add.xml","tests":4,"stagger":22},
            {"toggle":"WORK_ORDERS","group":"workorder-planning","name":"Work Order Planning","xml":"suite-workorder-planning.xml","tests":32,"stagger":80},
            {"toggle":"ASSET_1_2","group":"asset-1-2","name":"Asset Parts 1-2","xml":"suite-asset-1-2.xml","tests":69,"stagger":30},
            {"toggle":"ASSET_3","group":"asset-3","name":"Asset Part 3","xml":"suite-asset-3.xml","tests":76,"stagger":40},
            {"toggle":"ASSET_4","group":"asset-4","name":"Asset Part 4","xml":"suite-asset-4.xml","tests":65,"stagger":50},
            {"toggle":"ASSET_5","group":"asset-5","name":"Asset Part 5","xml":"suite-asset-5.xml","tests":76,"stagger":55},
            {"toggle":"ASSET_5","group":"asset-engineering","name":"Asset Engineering / Trip Config","xml":"suite-asset-engineering.xml","tests":12,"stagger":58},
            {"toggle":"ASSET_5","group":"asset-transformer","name":"Asset Engineering / Transformer","xml":"suite-asset-transformer.xml","tests":10,"stagger":60},
            {"toggle":"ASSET_5","group":"asset-engineering-matrix","name":"Asset Engineering / per-class matrix","xml":"suite-asset-engineering-matrix.xml","tests":39,"stagger":62},
            {"toggle":"ASSET_5","group":"asset-mains-config","name":"Asset Engineering / Mains Config","xml":"suite-asset-mains-config.xml","tests":17,"stagger":64},
            {"toggle":"ASSET_5","group":"asset-engineering-exhaustive","name":"Asset Engineering / exhaustive options","xml":"suite-asset-engineering-exhaustive.xml","tests":308,"stagger":66},
            {"toggle":"DASHBOARD_BUGHUNT","group":"dashboard-bughunt","name":"Dashboard + BugHunt","xml":"suite-dashboard-bughunt.xml","tests":105,"stagger":70},
            {"toggle":"SALES","group":"opportunities","name":"Opportunities [SALES]","xml":"suite-opportunities.xml","tests":41,"stagger":90},
            {"toggle":"SALES","group":"accounts","name":"Accounts [SALES]","xml":"suite-accounts.xml","tests":12,"stagger":100},
            {"toggle":"SALES","group":"goals","name":"Goals [SALES]","xml":"suite-goals.xml","tests":8,"stagger":110}
          ]'
          ENABLED=$(for t in AUTH_SITE LOCATION_TASK WORK_ORDERS ASSET_1_2 ASSET_3 ASSET_4 ASSET_5 DASHBOARD_BUGHUNT SALES; do
                      [ "${!t}" = "true" ] && echo "$t"; done | jq -R . | jq -cs .)
          SEL=$(echo "$CATALOG" | jq -c --argjson en "$ENABLED" \
                  '[ .[] | select(.toggle as $t | $en | index($t)) | del(.toggle) ]')
          echo "Enabled toggles: $ENABLED"
          echo "Selected groups: $(echo "$SEL" | jq -c '[.[].group]')"
          echo "matrix=$SEL" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$SEL" | jq 'length')" -gt 0 ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No module checkboxes selected — nothing to run."
          fi

  # ============================================================
  # Phase 1: Run each SELECTED group in parallel
  # ============================================================
  test-group:
    needs: prep
    if: ${{ needs.prep.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 480

    strategy:
      fail-fast: false
      max-parallel: 12

      matrix:
        include: ${{ fromJSON(needs.prep.outputs.matrix) }}
    name: "${{ matrix.name }} (${{ matrix.tests }} TCs)"

    steps:
      # ──────────────────────────────────────────────
      # Environment Setup
      # ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: |
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p reports/detail-report
          mkdir -p reports/client-report
          mkdir -p reports/groups

      - name: Compile project
        run: |
          echo "Compiling project..."
          mvn compile test-compile -B -q
          echo "Compilation successful"

      # ──────────────────────────────────────────────
      # Stagger Login — Avoid 10 Simultaneous Logins
      # ──────────────────────────────────────────────
      - name: Stagger login delay
        env:
          STAGGER_SECONDS: ${{ matrix.stagger }}
        run: |
          if [ "${STAGGER_SECONDS}" -gt 0 ]; then
            echo "Waiting ${STAGGER_SECONDS}s before starting tests (stagger login)..."
            sleep "${STAGGER_SECONDS}"
          fi

      # ──────────────────────────────────────────────
      # Run Tests via Dashboard Script (clean UI)
      # ──────────────────────────────────────────────
      - name: Run tests with dashboard
        id: run_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # Send a per-module email AS SOON AS this job's tests finish — so reviewers
          # don't have to wait for all 8 parallel groups before they get a Detailed Report.
          # The email subject is prefixed with the matrix group name (e.g. "Asset Part 3").
          SEND_EMAIL_ENABLED: "true"
          EMAIL_SUBJECT_PREFIX: "[${{ matrix.name }}] "
          FULL_SUITE_GROUP: ${{ matrix.group }}
        run: |
          bash .github/scripts/full-suite-dashboard.sh

      # ──────────────────────────────────────────────
      # Extract this group's FAILED tests for the dated re-runnable suite.
      # ──────────────────────────────────────────────
      - name: Extract failed tests
        if: always()
        run: |
          mkdir -p failed-lists
          python3 .github/scripts/collect-failed-tests.py --extract-only \
            --reports-dir target/surefire-reports \
            --out "failed-lists/${{ matrix.group }}.txt"

      - name: Upload failed-tests list
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failed-list-s1-${{ matrix.group }}
          path: failed-lists/${{ matrix.group }}.txt
          if-no-files-found: ignore

      # ──────────────────────────────────────────────
      # Write Result JSON (for summary job)
      # ──────────────────────────────────────────────
      # The dashboard script writes SUITE_PASSED, SUITE_FAILED,
      # SUITE_SKIPPED, SUITE_DURATION, SUITE_RESULT to GITHUB_ENV.
      - name: Write result JSON
        if: always()
        env:
          GROUP_KEY: ${{ matrix.group }}
          GROUP_NAME: ${{ matrix.name }}
          EXPECTED: ${{ matrix.tests }}
        run: |
          mkdir -p results

          # Read from GITHUB_ENV vars set by the dashboard script
          export R_PASSED=${SUITE_PASSED:-0}
          export R_FAILED=${SUITE_FAILED:-0}
          export R_SKIPPED=${SUITE_SKIPPED:-0}
          export R_TOTAL=$((R_PASSED + R_FAILED + R_SKIPPED))
          export R_DURATION=${SUITE_DURATION:-0}

          if [ "$R_TOTAL" -eq 0 ]; then
            export R_STATUS="error"
          elif [ "$R_FAILED" -gt 0 ]; then
            export R_STATUS="failed"
          else
            export R_STATUS="passed"
          fi

          python3 -c "
          import json, os
          data = {
              'group': os.environ.get('GROUP_KEY', ''),
              'name': os.environ.get('GROUP_NAME', ''),
              'expected_tests': int(os.environ.get('EXPECTED', '0')),
              'passed': int(os.environ.get('R_PASSED', '0')),
              'failed': int(os.environ.get('R_FAILED', '0')),
              'skipped': int(os.environ.get('R_SKIPPED', '0')),
              'total': int(os.environ.get('R_TOTAL', '0')),
              'status': os.environ.get('R_STATUS', 'error'),
              'duration_seconds': int(os.environ.get('R_DURATION', '0'))
          }
          with open(f\"results/{data['group']}.json\", 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

      # ──────────────────────────────────────────────
      # Per-Group Step Summary
      # ──────────────────────────────────────────────
      - name: Group summary
        if: always()
        env:
          GROUP_NAME: ${{ matrix.name }}
        run: |
          R_PASSED=${SUITE_PASSED:-0}
          R_FAILED=${SUITE_FAILED:-0}
          R_SKIPPED=${SUITE_SKIPPED:-0}
          R_DURATION=${SUITE_DURATION:-0}

          ICON="✅"
          [ "$R_FAILED" -gt 0 ] && ICON="❌"
          [ "$((R_PASSED + R_FAILED + R_SKIPPED))" -eq 0 ] && ICON="⚠️"

          {
            echo "## ${ICON} ${GROUP_NAME}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Passed | ${R_PASSED} |"
            echo "| Failed | ${R_FAILED} |"
            echo "| Skipped | ${R_SKIPPED} |"
            echo "| Duration | ${R_DURATION}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Upload Artifacts (unique names per group)
      # ──────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reports-${{ matrix.group }}
          path: |
            reports/detail-report/
            reports/groups/
            test-output/screenshots/
          retention-days: 30
          # NOTE: target/surefire-reports/ intentionally excluded —
          # reports/groups/ already contains the copy (via dashboard script).
          # Including both caused every test to appear twice in the
          # consolidated report (duplicate testng-results.xml files).

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: result-${{ matrix.group }}
          path: results/${{ matrix.group }}.json
          retention-days: 7

  # ============================================================
  # Phase 2: Aggregate Results from All Groups
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: test-group
    # Run on test-group success OR failure, but NOT when test-group was skipped (no modules ticked):
    # with no result artifacts the aggregate reports "No test results collected" → error → spurious fail.
    if: ${{ always() && needs.test-group.result != 'skipped' }}
    timeout-minutes: 10
    outputs:
      overall_status: ${{ steps.aggregate.outputs.overall_status }}
      total_failed: ${{ steps.aggregate.outputs.total_failed }}
      total_passed: ${{ steps.aggregate.outputs.total_passed }}
      total_skipped: ${{ steps.aggregate.outputs.total_skipped }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Download all result JSONs
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: result-*
          path: results
          merge-multiple: true

      - name: Download all test reports
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: reports-*
          path: all-reports

      # ──────────────────────────────────────────────
      # Build + commit the dated failed-tests suite (see failed-suites/README.md).
      # --merge unions with any suite already committed today so Parallel Suite 1
      # and 2 both feed the same dated file; reset-to-origin + retry = race-safe.
      # ──────────────────────────────────────────────
      - name: Download failed-tests lists
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: failed-list-s1-*
          path: failed-lists-dl
          merge-multiple: true

      - name: Build + commit dated failed-tests suite
        if: always()
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          LABEL="Parallel Suite (run ${{ github.run_number }})"
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main
            python3 .github/scripts/collect-failed-tests.py --build \
              --lists-dir failed-lists-dl --date "$DATE" --label "$LABEL" --merge
            git add failed-suites/
            if git diff --cached --quiet; then echo "No failed-tests changes."; break; fi
            git commit -m "[bot] failed-tests suite ${DATE} — Parallel Suite"
            if git push origin HEAD:main; then echo "Pushed failed-tests suite."; break; fi
            echo "push race (attempt $attempt) — retrying"; sleep $(( (RANDOM % 5) + 2 ))
          done

      - name: Upload failed-tests suite artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failed-tests-suite-s1
          path: failed-suites/
          if-no-files-found: ignore

      - name: Aggregate results
        id: aggregate
        run: |
          echo ""
          echo "================================================================"
          echo "  PARALLEL SUITE — Aggregating Results"
          echo "================================================================"
          echo ""

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_SKIPPED=0
          TOTAL_TESTS=0
          GROUP_COUNT=0

          for json in results/*.json; do
            [ -f "$json" ] || continue
            GROUP_COUNT=$((GROUP_COUNT + 1))

            eval "$(python3 -c "
          import json, os
          d = json.load(open('$json'))
          print(f\"NAME='{d[\"name\"]}'\"  )
          print(f\"PASSED={d['passed']}\"  )
          print(f\"FAILED={d['failed']}\"  )
          print(f\"SKIPPED={d['skipped']}\")
          print(f\"DURATION={d['duration_seconds']}\")
          print(f\"STATUS={d['status']}\"  )
          ")"

            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            TOTAL_TESTS=$((TOTAL_TESTS + PASSED + FAILED + SKIPPED))

            ICON="✅"; [ "$STATUS" = "failed" ] && ICON="❌"; [ "$STATUS" = "error" ] && ICON="⚠️"
            printf "  %s  %-35s  P:%-4s F:%-4s S:%-4s  %ss\n" \
              "$ICON" "$NAME" "$PASSED" "$FAILED" "$SKIPPED" "$DURATION"
          done

          echo ""
          echo "────────────────────────────────────────────"
          echo "  TOTAL:  Passed=$TOTAL_PASSED  Failed=$TOTAL_FAILED  Skipped=$TOTAL_SKIPPED"
          echo "  Groups: $GROUP_COUNT / 9 completed"
          echo "────────────────────────────────────────────"

          {
            echo "total_passed=${TOTAL_PASSED}"
            echo "total_failed=${TOTAL_FAILED}"
            echo "total_skipped=${TOTAL_SKIPPED}"
            echo "total_tests=${TOTAL_TESTS}"
            echo "group_count=${GROUP_COUNT}"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "overall_status=error" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "overall_status=partial" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=passed" >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────────
      # Consolidated Client Report (Single HTML)
      # ──────────────────────────────────────────────
      - name: Generate consolidated client report
        if: always()
        id: report
        env:
          SEND_EMAIL_ENABLED: ${{ inputs.send_email && secrets.EMAIL_PASSWORD != '' && 'true' || 'false' }}
          EMAIL_FROM: "abhiyant.singh@egalvanic.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "abhiyant.singh@egalvanic.com"
        run: |
          python3 .github/scripts/consolidated-report.py \
            all-reports \
            reports/client-report/Consolidated_Client_Report.html

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-client-report
          path: reports/client-report/Consolidated_Client_Report.html
          retention-days: 30

      # ──────────────────────────────────────────────
      # Consolidated DETAILED report — every module's full Detailed Report
      # (steps + INLINE base64 screenshots) bundled into one navigable index.
      # LARGE (tens of MB) -> uploaded as an ARTIFACT ONLY, never emailed.
      # ──────────────────────────────────────────────
      - name: Generate consolidated detailed report
        if: always()
        run: |
          python3 .github/scripts/consolidated-detailed-report.py \
            all-reports reports/consolidated-detailed \
            --title "Consolidated Detailed Report — Parallel Full Suite (run ${{ github.run_number }})" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Upload consolidated detailed report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-detailed-report
          path: reports/consolidated-detailed/
          retention-days: 30
          if-no-files-found: ignore

      # ──────────────────────────────────────────────
      # Combined Step Summary
      # ──────────────────────────────────────────────
      - name: Generate combined summary
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          TOTAL_SKIPPED: ${{ steps.aggregate.outputs.total_skipped }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          HEADER="### ALL TESTS PASSED"
          [ "${STATUS}" = "partial" ] && HEADER="### SOME TESTS FAILED"
          [ "${STATUS}" = "error" ] && HEADER="### ERROR"

          {
            echo "## Parallel Full Suite — Combined Results"
            echo ""
            echo "${HEADER}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total | ${TOTAL_TESTS} |"
            echo "| Passed | ${TOTAL_PASSED} |"
            echo "| Failed | ${TOTAL_FAILED} |"
            echo "| Skipped | ${TOTAL_SKIPPED} |"
            echo "| Groups | ${GROUP_COUNT} / 8 |"
            echo ""
            echo "### Individual Group Results"
            echo ""
            echo "| Group | Status | Passed | Failed | Skipped | Duration |"
            echo "|-------|--------|--------|--------|---------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for json in results/*.json; do
            [ -f "$json" ] || continue
            python3 -c "
          import json
          d = json.load(open('$json'))
          icon = '✅' if d['status'] == 'passed' else '❌' if d['status'] == 'failed' else '⚠️'
          s = d['duration_seconds']
          dur = f'{s // 60}m {s % 60}s' if s >= 60 else f'{s}s'
          print(f\"| {d['name']} | {icon} {d['status']} | {d['passed']} | {d['failed']} | {d['skipped']} | {dur} |\")
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          done

          {
            echo ""
            echo "### Reports"
            echo "- **Consolidated Client Report**: Single HTML covering all modules — artifact \`consolidated-client-report\`"
            echo "- **Per-group details**: Individual reports in \`reports-{group-name}\` artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Final Pass/Fail
      # ──────────────────────────────────────────────
      - name: Check overall result
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          echo ""
          if [ "${STATUS}" = "passed" ]; then
            echo "ALL ${TOTAL_TESTS} TESTS PASSED across ${GROUP_COUNT} groups"
          elif [ "${STATUS}" = "partial" ]; then
            echo "SOME TESTS FAILED: ${TOTAL_PASSED}/${TOTAL_TESTS} passed, ${TOTAL_FAILED} failed"
            echo "Check individual group artifacts for details"
          else
            echo "ERROR: No test results collected"
            exit 1
          fi

  # ============================================================
  # Phase 4: Re-run failed tests → SECOND ("after re-run") client report
  # ------------------------------------------------------------
  # If the first pass had failures, re-run ONLY the collected failed tests and produce a SECOND client
  # report showing the FULL suite with each re-run test's fresh outcome substituted in (recovered → PASS,
  # still-broken → FAIL). Two client reports per run:
  #   • consolidated-client-report             → BEFORE re-run (the summary job)
  #   • consolidated-client-report-after-rerun → AFTER re-run (this job)
  # Skipped automatically when the first pass was all-green (overall_status != 'partial').
  # ============================================================
  rerun-failed:
    runs-on: ubuntu-latest
    needs: summary
    if: ${{ always() && needs.summary.outputs.overall_status == 'partial' }}
    timeout-minutes: 240
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Download original reports (before re-run)
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: reports-*
          path: all-reports

      - name: Download collected failed-tests suite
        uses: actions/download-artifact@v4.3.0
        with:
          name: failed-tests-suite-s1
          path: failed-suites

      - name: Create output dirs
        run: mkdir -p test-output/screenshots reports/detail-report reports/client-report-rerun rerun-results

      - name: Compile
        run: mvn -B -q test-compile

      - name: Re-run failed tests
        id: rerun
        continue-on-error: true
        env:
          SEND_EMAIL_ENABLED: "false"
        run: |
          SUITE="failed-suites/failed-tests-latest.xml"
          if [ ! -f "$SUITE" ]; then
            echo "::warning::No failed-tests-latest.xml found — nothing to re-run."
            exit 0
          fi
          COUNT=$(grep -c 'include name=' "$SUITE" || echo 0)
          echo "Re-running ${COUNT} failed test method(s) from ${SUITE}"
          mvn -B test -DsuiteXmlFile="$SUITE" -Dheadless=true 2>&1 | tail -40 || true
          cp -r target/surefire-reports/* rerun-results/ 2>/dev/null || true

      - name: Triage still-failing vs recovered
        if: always()
        run: |
          mkdir -p rerun-out
          python3 .github/scripts/collect-failed-tests.py --extract-only \
            --reports-dir target/surefire-reports --out rerun-out/still-failing.txt || true
          STILL=$(wc -l < rerun-out/still-failing.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "STILL_FAILING=${STILL}" >> "$GITHUB_ENV"
          echo "BEFORE_FAILING=${{ needs.summary.outputs.total_failed }}" >> "$GITHUB_ENV"

      - name: Generate AFTER-RERUN consolidated client report
        if: always()
        env:
          SEND_EMAIL_ENABLED: ${{ inputs.send_email && secrets.EMAIL_PASSWORD != '' && 'true' || 'false' }}
          EMAIL_FROM: "abhiyant.singh@egalvanic.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "abhiyant.singh@egalvanic.com"
          EMAIL_SUBJECT_SUFFIX: " (After Re-run)"
        run: |
          python3 .github/scripts/consolidated-report.py \
            all-reports \
            reports/client-report-rerun/Consolidated_Client_Report_AfterRerun.html \
            --rerun-dir rerun-results

      - name: Generate AFTER-RERUN client-ready report
        if: always()
        run: |
          python3 .github/scripts/client-report.py \
            reports/client-report-rerun/Consolidated_Client_Report_AfterRerun.html \
            reports/client-report-rerun/Client_Report_Polished_AfterRerun.html || true

      - name: Upload AFTER-RERUN client report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-client-report-after-rerun
          path: |
            reports/client-report-rerun/Consolidated_Client_Report_AfterRerun.html
            reports/client-report-rerun/Client_Report_Polished_AfterRerun.html
          retention-days: 30
          if-no-files-found: warn

      # AFTER-RERUN consolidated DETAILED report: the original modules (steps + inline
      # screenshots) + an authoritative merged-totals banner (recovered re-run passes
      # counted as PASS), recovered tests re-badged green, and the re-run's own detailed
      # reports appended as "[re-run]" modules.
      - name: Generate AFTER-RERUN consolidated detailed report
        if: always()
        run: |
          python3 .github/scripts/consolidated-detailed-report.py \
            all-reports reports/consolidated-detailed-rerun \
            --title "Consolidated Detailed Report — Parallel Suite AFTER RE-RUN (run ${{ github.run_number }})" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            --rerun-detail reports/detail-report \
            --rerun-results rerun-results || true

      - name: Upload AFTER-RERUN consolidated detailed report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-detailed-report-after-rerun
          path: reports/consolidated-detailed-rerun/
          retention-days: 30
          if-no-files-found: warn

      - name: Re-run summary
        if: always()
        run: |
          {
            echo "## Parallel Suite — Re-run of failed tests"
            echo ""
            echo "- Failed in first pass: **${BEFORE_FAILING:-?}**"
            echo "- Still failing after re-run: **${STILL_FAILING:-?}** (the rest recovered — env-flaky or fixed)"
            echo ""
            echo "Reports attached to this run:"
            echo "- \`consolidated-client-report\` — client report **before** re-run"
            echo "- \`consolidated-client-report-after-rerun\` — client report **after** re-run (merged totals)"
            echo "- \`consolidated-detailed-report\` — detailed report **before** re-run"
            echo "- \`consolidated-detailed-report-after-rerun\` — detailed report **after** re-run (merged banner + recovered re-badged + [re-run] modules)"
          } >> "$GITHUB_STEP_SUMMARY"
