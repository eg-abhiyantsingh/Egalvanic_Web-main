name: Parallel Suite 2 вЂ” Curated Bug Verification + AI + Smoke + Load

# ============================================================
# PARALLEL SUITE 2 вЂ” 7 Groups Running Simultaneously
# ============================================================
#
# Complementary suite to parallel-suite.yml. Runs the curated 8-bug
# regression gate (client-facing), plus lighter AI-powered and
# exploratory test modules.
#
# Groups (7 parallel jobs):
#   Group  1: Curated Bug Verification    (  8 TCs)  ~15 min  [CLIENT]
#   Group  2: Smoke Suites                ( 37 TCs)  ~10 min
#   Group  3: Load + API + Critical Path  ( 62 TCs)  ~15 min
#   Group  4: AI Form Creation            ( 56 TCs)  ~20 min
#   Group  5: Monkey Exploratory          (  4 TCs)  ~10 min
#   Group  6: Visual Regression           (  7 TCs)  ~10 min
#   Group  7: AI Page Analyzer            (  3 TCs)  ~10 min
#
# Total: ~177 TCs across 7 groups.
# The client-facing bug report PDF is uploaded as an artifact of the
# summary job so it can be attached to client communications.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email report after completion'
        required: false
        type: boolean
        default: true

concurrency:
  group: parallel-suite-2
  cancel-in-progress: false

jobs:
  # ============================================================
  # Phase 1: Run each group in parallel
  # ============================================================
  test-group:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    strategy:
      fail-fast: false
      max-parallel: 7

      matrix:
        include:
          # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          # CLIENT-FACING: Curated 8-bug regression gate
          # (DeepBugVerificationTestNG + SecurityAuditTestNG)
          # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          - group: curated-bug-verification
            name: "Curated Bug Verification"
            xml: deep-bug-verification-testng.xml
            tests: 8
            stagger: 0

          - group: smoke
            name: "Smoke Suites"
            xml: smoke-testng.xml
            tests: 37
            stagger: 10

          - group: load-api-critical
            name: "Load + API + Critical Path"
            xml: suite-load-api.xml
            tests: 62
            stagger: 20

          - group: ai-form
            name: "AI Form Creation"
            xml: suite-ai-form.xml
            tests: 56
            stagger: 30

          - group: monkey
            name: "Monkey Exploratory"
            xml: suite-monkey.xml
            tests: 4
            stagger: 40

          - group: visual-regression
            name: "Visual Regression"
            xml: suite-visual.xml
            tests: 7
            stagger: 50

          - group: ai-analyzer
            name: "AI Page Analyzer"
            xml: suite-ai-analyzer.xml
            tests: 3
            stagger: 60

    name: "${{ matrix.name }} (${{ matrix.tests }} TCs)"

    steps:
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Environment Setup
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: |
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p test-output/visual-baselines
          mkdir -p test-output/visual-diffs
          mkdir -p reports/detail-report
          mkdir -p reports/client-report
          mkdir -p reports/groups

      - name: Compile project
        run: |
          echo "Compiling project..."
          mvn compile test-compile -B -q
          echo "Compilation successful"

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Stagger Login вЂ” Avoid Simultaneous Logins
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Stagger login delay
        env:
          STAGGER_SECONDS: ${{ matrix.stagger }}
        run: |
          if [ "${STAGGER_SECONDS}" -gt 0 ]; then
            echo "Waiting ${STAGGER_SECONDS}s before starting tests (stagger login)..."
            sleep "${STAGGER_SECONDS}"
          fi

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Run Tests via Dashboard Script (clean UI)
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Run tests with dashboard
        id: run_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          FULL_SUITE_GROUP: ${{ matrix.group }}
        run: |
          bash .github/scripts/full-suite-dashboard.sh

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Write Result JSON (for summary job)
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Write result JSON
        if: always()
        env:
          GROUP_KEY: ${{ matrix.group }}
          GROUP_NAME: ${{ matrix.name }}
          EXPECTED: ${{ matrix.tests }}
        run: |
          mkdir -p results

          export R_PASSED=${SUITE_PASSED:-0}
          export R_FAILED=${SUITE_FAILED:-0}
          export R_SKIPPED=${SUITE_SKIPPED:-0}
          export R_TOTAL=$((R_PASSED + R_FAILED + R_SKIPPED))
          export R_DURATION=${SUITE_DURATION:-0}

          if [ "$R_TOTAL" -eq 0 ]; then
            export R_STATUS="error"
          elif [ "$R_FAILED" -gt 0 ]; then
            export R_STATUS="failed"
          else
            export R_STATUS="passed"
          fi

          python3 -c "
          import json, os
          data = {
              'group': os.environ.get('GROUP_KEY', ''),
              'name': os.environ.get('GROUP_NAME', ''),
              'expected_tests': int(os.environ.get('EXPECTED', '0')),
              'passed': int(os.environ.get('R_PASSED', '0')),
              'failed': int(os.environ.get('R_FAILED', '0')),
              'skipped': int(os.environ.get('R_SKIPPED', '0')),
              'total': int(os.environ.get('R_TOTAL', '0')),
              'status': os.environ.get('R_STATUS', 'error'),
              'duration_seconds': int(os.environ.get('R_DURATION', '0'))
          }
          with open(f\"results/{data['group']}.json\", 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Per-Group Step Summary
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Group summary
        if: always()
        env:
          GROUP_NAME: ${{ matrix.name }}
        run: |
          R_PASSED=${SUITE_PASSED:-0}
          R_FAILED=${SUITE_FAILED:-0}
          R_SKIPPED=${SUITE_SKIPPED:-0}
          R_DURATION=${SUITE_DURATION:-0}

          ICON="вњ…"
          [ "$R_FAILED" -gt 0 ] && ICON="вќЊ"
          [ "$((R_PASSED + R_FAILED + R_SKIPPED))" -eq 0 ] && ICON="вљ пёЏ"

          {
            echo "## ${ICON} ${GROUP_NAME}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Passed | ${R_PASSED} |"
            echo "| Failed | ${R_FAILED} |"
            echo "| Skipped | ${R_SKIPPED} |"
            echo "| Duration | ${R_DURATION}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Upload Artifacts (unique names per group)
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-s2-${{ matrix.group }}
          path: |
            reports/detail-report/
            reports/groups/
            test-output/screenshots/
            test-output/visual-diffs/
          retention-days: 30
          # NOTE: target/surefire-reports/ intentionally excluded вЂ”
          # reports/groups/ already contains the copy (via dashboard script).
          # Including both caused every test to appear twice in the
          # consolidated report (duplicate testng-results.xml files).

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-s2-${{ matrix.group }}
          path: results/${{ matrix.group }}.json
          retention-days: 7

  # ============================================================
  # Phase 2: Aggregate Results from All Groups
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: test-group
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all result JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: result-s2-*
          path: results
          merge-multiple: true

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          pattern: reports-s2-*
          path: all-reports

      - name: Aggregate results
        id: aggregate
        run: |
          echo ""
          echo "================================================================"
          echo "  PARALLEL SUITE 2 вЂ” Aggregating Results"
          echo "================================================================"
          echo ""

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_SKIPPED=0
          TOTAL_TESTS=0
          GROUP_COUNT=0

          for json in results/*.json; do
            [ -f "$json" ] || continue
            GROUP_COUNT=$((GROUP_COUNT + 1))

            eval "$(python3 -c "
          import json, os
          d = json.load(open('$json'))
          print(f\"NAME='{d[\"name\"]}'\"  )
          print(f\"PASSED={d['passed']}\"  )
          print(f\"FAILED={d['failed']}\"  )
          print(f\"SKIPPED={d['skipped']}\")
          print(f\"DURATION={d['duration_seconds']}\")
          print(f\"STATUS={d['status']}\"  )
          ")"

            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            TOTAL_TESTS=$((TOTAL_TESTS + PASSED + FAILED + SKIPPED))

            ICON="вњ…"; [ "$STATUS" = "failed" ] && ICON="вќЊ"; [ "$STATUS" = "error" ] && ICON="вљ пёЏ"
            printf "  %s  %-35s  P:%-4s F:%-4s S:%-4s  %ss\n" \
              "$ICON" "$NAME" "$PASSED" "$FAILED" "$SKIPPED" "$DURATION"
          done

          echo ""
          echo "в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
          echo "  TOTAL:  Passed=$TOTAL_PASSED  Failed=$TOTAL_FAILED  Skipped=$TOTAL_SKIPPED"
          echo "  Groups: $GROUP_COUNT / 7 completed"
          echo "в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"

          {
            echo "total_passed=${TOTAL_PASSED}"
            echo "total_failed=${TOTAL_FAILED}"
            echo "total_skipped=${TOTAL_SKIPPED}"
            echo "total_tests=${TOTAL_TESTS}"
            echo "group_count=${GROUP_COUNT}"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "overall_status=error" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "overall_status=partial" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=passed" >> "$GITHUB_OUTPUT"
          fi

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Consolidated Client Report (Single HTML)
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate consolidated client report
        if: always()
        id: report
        env:
          SEND_EMAIL_ENABLED: ${{ inputs.send_email && secrets.EMAIL_PASSWORD != '' && 'true' || 'false' }}
          EMAIL_FROM: "abhiyant.singh@egalvanic.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "dharmesh.avaiya@egalvanic.com, mukul@egalvanic.com, abhiyant.singh@egalvanic.com"
        run: |
          python3 .github/scripts/consolidated-report.py \
            all-reports \
            reports/client-report/Consolidated_Client_Report_Suite2.html

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Generate CLIENT-READY report from the consolidated one
      # (executive summary + feature-area coverage + known-issues split)
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate client-ready report
        if: always()
        run: |
          python3 .github/scripts/client-report.py \
            reports/client-report/Consolidated_Client_Report_Suite2.html \
            reports/client-report/Client_Report_Polished_Suite2.html

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-client-report-suite2
          path: |
            reports/client-report/Consolidated_Client_Report_Suite2.html
            reports/client-report/Client_Report_Polished_Suite2.html
          retention-days: 30

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Client-facing Curated Bug Report (8 validated bugs)
      # Uploaded as a SEPARATE artifact so the client package
      # includes both the run results AND the consolidated PDF.
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload curated bug report PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curated-bug-report-client
          path: |
            bug pdf/eGalvanic_Deep_Bug_Report_20_April_2026.pdf
            bug pdf/eGalvanic_Deep_Bug_Report_20_April_2026.html
          retention-days: 90
          if-no-files-found: warn

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Combined Step Summary
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate combined summary
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          TOTAL_SKIPPED: ${{ steps.aggregate.outputs.total_skipped }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          HEADER="### ALL TESTS PASSED"
          [ "${STATUS}" = "partial" ] && HEADER="### SOME TESTS FAILED"
          [ "${STATUS}" = "error" ] && HEADER="### ERROR"

          {
            echo "## Parallel Suite 2 вЂ” Combined Results"
            echo ""
            echo "${HEADER}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total | ${TOTAL_TESTS} |"
            echo "| Passed | ${TOTAL_PASSED} |"
            echo "| Failed | ${TOTAL_FAILED} |"
            echo "| Skipped | ${TOTAL_SKIPPED} |"
            echo "| Groups | ${GROUP_COUNT} / 7 |"
            echo ""
            echo "### Individual Group Results"
            echo ""
            echo "| Group | Status | Passed | Failed | Skipped | Duration |"
            echo "|-------|--------|--------|--------|---------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for json in results/*.json; do
            [ -f "$json" ] || continue
            python3 -c "
          import json
          d = json.load(open('$json'))
          icon = 'вњ…' if d['status'] == 'passed' else 'вќЊ' if d['status'] == 'failed' else 'вљ пёЏ'
          s = d['duration_seconds']
          dur = f'{s // 60}m {s % 60}s' if s >= 60 else f'{s}s'
          print(f\"| {d['name']} | {icon} {d['status']} | {d['passed']} | {d['failed']} | {d['skipped']} | {dur} |\")
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          done

          {
            echo ""
            echo "### Reports"
            echo "- **Client-Polished Report (SEND TO CLIENT)**: \`Client_Report_Polished_Suite2.html\` inside artifact \`consolidated-client-report-suite2\` вЂ” executive summary, feature-area coverage, separates known-issues from functional failures"
            echo "- **Curated Bug Report**: PDF + HTML of the 8 validated bugs вЂ” artifact \`curated-bug-report-client\` (90-day retention)"
            echo "- **Consolidated Technical Report**: \`Consolidated_Client_Report_Suite2.html\` (same artifact as above) вЂ” full test-level detail for engineering"
            echo "- **Per-group details**: Individual reports in \`reports-s2-{group-name}\` artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Final Pass/Fail
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Check overall result
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          echo ""
          if [ "${STATUS}" = "passed" ]; then
            echo "ALL ${TOTAL_TESTS} TESTS PASSED across ${GROUP_COUNT} groups"
          elif [ "${STATUS}" = "partial" ]; then
            echo "SOME TESTS FAILED: ${TOTAL_PASSED}/${TOTAL_TESTS} passed, ${TOTAL_FAILED} failed"
            echo "Check individual group artifacts for details"
          else
            echo "ERROR: No test results collected"
            exit 1
          fi
