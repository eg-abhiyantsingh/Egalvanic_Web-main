name: Parallel Suite 2 — Curated Bug Verification + AI + Smoke + Load + BCES-IQ

# ============================================================
# PARALLEL SUITE 2 — 9 Groups Running Simultaneously
# ============================================================
#
# Complementary suite to parallel-suite.yml. Runs the curated 8-bug
# regression gate (client-facing), lighter AI-powered and exploratory
# test modules, plus a cross-tenant smoke for acme.bces-iq.com.
#
# Groups (10 parallel jobs):
#   Group  1: Curated Bug Verification     (  8 TCs)  ~15 min  [CLIENT]
#   Group  2: Smoke Suites                 ( 37 TCs)  ~10 min
#   Group  3: Load + API + Critical Path   ( 62 TCs)  ~15 min
#   Group  4: AI Form Creation             ( 56 TCs)  ~20 min
#   Group  5: Monkey Exploratory           (  4 TCs)  ~10 min
#   Group  6: Visual Regression            (  7 TCs)  ~10 min
#   Group  7: AI Page Analyzer             (  3 TCs)  ~10 min
#   Group  8: BCES-IQ Tenant Smoke         (  3 TCs)  ~5 min   [NEW TENANT]
#   Group  9: Documentation-Inspired Tests ( 17 TCs)  ~10 min  [NEW 2026-04-27]
#   Group 10: Quality Gates (All Pages)    (225 TCs)  ~60 min  [NEW 2026-06-03: a11y+perf+assets+responsive+detail-tabs across 59 routes (incl. Settings + Reporting hub deep-views) + deep interaction on thin modules]
#
# Total: ~422 TCs across 10 groups.
#
# The BCES-IQ group runs the SAME test framework against
# https://acme.bces-iq.com using a different user (shubham.goswami+acme@...)
# via env-var overrides on BASE_URL / USER_EMAIL / USER_PASSWORD. The
# password comes from the BCES_IQ_PASSWORD repo secret (set manually in
# GitHub settings). If the secret is missing, the job falls back to a
# safe no-op (won't accidentally pummel the tenant with bad logins).
#
# The client-facing bug report PDF is uploaded as an artifact of the
# summary job so it can be attached to client communications.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      # ── Module groups: checkboxes — tick the ones you want, untick to skip.
      #    All default ON, so a plain "Run workflow" runs everything (as before).
      #    Only the ticked modules spin up runners (built into a dynamic matrix). ──
      curated_bug:
        description: 'Curated Bug Verification (8 client-facing regression TCs)'
        type: boolean
        default: true
      smoke:
        description: 'Smoke — acme.qa Smoke Suites + BCES-IQ tenant smoke'
        type: boolean
        default: true
      load_api:
        description: 'Load + API + Critical Path'
        type: boolean
        default: true
      ai:
        description: 'AI — Form Creation + Page Analyzer'
        type: boolean
        default: true
      exploratory:
        description: 'Exploratory — Monkey + Visual Regression'
        type: boolean
        default: true
      quality_gates:
        description: 'Quality Gates (All Pages — a11y/perf/responsive, 225 TCs)'
        type: boolean
        default: true
      doc_inspired:
        description: 'Documentation-Inspired Tests'
        type: boolean
        default: true
      # ── RBAC (opt-in — off by default). ──
      rbac_api:
        description: 'RBAC — API tests (contract + 791-cell matrix + edit + CRUD enforcement)'
        type: boolean
        default: false
      rbac_all:
        description: 'RBAC — ALL tests (login + work-order edit + nav gating + API)'
        type: boolean
        default: false
      # ── Delivery. ──
      send_email:
        description: 'Send email report after completion'
        type: boolean
        default: true

concurrency:
  group: parallel-suite-2
  cancel-in-progress: false

# The summary job commits the dated failed-tests suite back to main
# (same [bot] pattern as daily-ai-analysis.yml).
permissions:
  contents: write

jobs:
  # ============================================================
  # Phase 0: Build the run-matrix from the selected module checkboxes.
  # Each checkbox maps to one or more matrix groups; only ticked ones run.
  # ============================================================
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      any: ${{ steps.build.outputs.any }}
    steps:
      - name: Build dynamic matrix from selected modules
        id: build
        env:
          CURATED: ${{ inputs.curated_bug }}
          SMOKE: ${{ inputs.smoke }}
          LOAD_API: ${{ inputs.load_api }}
          AI: ${{ inputs.ai }}
          EXPLORATORY: ${{ inputs.exploratory }}
          QUALITY: ${{ inputs.quality_gates }}
          DOC: ${{ inputs.doc_inspired }}
        run: |
          # Catalog of all groups; each tagged with the checkbox (toggle) that enables it.
          # Merged checkboxes (smoke, ai, exploratory) map to >1 group.
          CATALOG='[
            {"toggle":"CURATED","group":"curated-bug-verification","name":"Curated Bug Verification","xml":"deep-bug-verification-testng.xml","tests":8,"stagger":0},
            {"toggle":"SMOKE","group":"smoke","name":"Smoke Suites","xml":"smoke-testng.xml","tests":37,"stagger":10},
            {"toggle":"SMOKE","group":"bces-iq-smoke","name":"BCES-IQ Tenant Smoke","xml":"smoke-bces-iq-testng.xml","tests":3,"stagger":70,"base_url":"https://acme.bces-iq.com","user_email":"shubham.goswami+acme@egalvanic.com","user_password":"Shubham@123"},
            {"toggle":"LOAD_API","group":"load-api","name":"Load + API + Critical Path","xml":"suite-load-api.xml","tests":62,"stagger":20},
            {"toggle":"AI","group":"ai-form","name":"AI Form Creation","xml":"suite-ai-form.xml","tests":56,"stagger":30},
            {"toggle":"AI","group":"ai-analyzer","name":"AI Page Analyzer","xml":"suite-ai-analyzer.xml","tests":3,"stagger":60},
            {"toggle":"EXPLORATORY","group":"monkey","name":"Monkey Exploratory","xml":"suite-monkey.xml","tests":4,"stagger":40},
            {"toggle":"EXPLORATORY","group":"visual-regression","name":"Visual Regression","xml":"suite-visual.xml","tests":7,"stagger":50},
            {"toggle":"DOC","group":"doc-inspired","name":"Documentation-Inspired Tests","xml":"suite-doc-inspired.xml","tests":17,"stagger":65},
            {"toggle":"QUALITY","group":"quality-gates","name":"Quality Gates (All Pages)","xml":"suite-quality-gates.xml","tests":225,"stagger":68}
          ]'
          ENABLED=$(for t in CURATED SMOKE LOAD_API AI EXPLORATORY QUALITY DOC; do
                      [ "${!t}" = "true" ] && echo "$t"; done | jq -R . | jq -cs .)
          SEL=$(echo "$CATALOG" | jq -c --argjson en "$ENABLED" \
                  '[ .[] | select(.toggle as $t | $en | index($t)) | del(.toggle) ]')
          echo "Enabled toggles: $ENABLED"
          echo "Selected groups: $(echo "$SEL" | jq -c '[.[].group]')"
          echo "matrix=$SEL" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$SEL" | jq 'length')" -gt 0 ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No functional module checkboxes selected — test-group skipped (RBAC jobs, if ticked, still run)."
          fi

  # ============================================================
  # Phase 1: Run each SELECTED group in parallel
  # ============================================================
  test-group:
    needs: prep
    if: ${{ needs.prep.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 480

    strategy:
      fail-fast: false
      max-parallel: 11

      # Dynamic: only the modules ticked in the dispatch form (built by `prep`).
      # The full group catalog (incl. the BCES-IQ cross-tenant overrides) lives in
      # the `prep` job above; edit it there to add/rename groups.
      matrix:
        include: ${{ fromJSON(needs.prep.outputs.matrix) }}

    name: "${{ matrix.name }} (${{ matrix.tests }} TCs)"

    steps:
      # ──────────────────────────────────────────────
      # Environment Setup
      # ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: |
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p test-output/visual-baselines
          mkdir -p test-output/visual-diffs
          mkdir -p reports/detail-report
          mkdir -p reports/client-report
          mkdir -p reports/groups

      - name: Compile project
        run: |
          echo "Compiling project..."
          mvn compile test-compile -B -q
          echo "Compilation successful"

      # ──────────────────────────────────────────────
      # Stagger Login — Avoid Simultaneous Logins
      # ──────────────────────────────────────────────
      - name: Stagger login delay
        env:
          STAGGER_SECONDS: ${{ matrix.stagger }}
        run: |
          if [ "${STAGGER_SECONDS}" -gt 0 ]; then
            echo "Waiting ${STAGGER_SECONDS}s before starting tests (stagger login)..."
            sleep "${STAGGER_SECONDS}"
          fi

      # ──────────────────────────────────────────────
      # Run Tests via Dashboard Script (clean UI)
      # ──────────────────────────────────────────────
      - name: Run tests with dashboard
        id: run_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          FULL_SUITE_GROUP: ${{ matrix.group }}
          # Per-matrix tenant overrides. When a matrix entry sets these
          # fields, AppConstants#getEnv() substitutes them for the defaults
          # (acme.qa.egalvanic.ai / abhiyant.singh+admin@... / RP@egalvanic123).
          # Empty string is treated as "use default", so non-bces-iq jobs
          # transparently fall through to the standard acme.qa credentials.
          BASE_URL: ${{ matrix.base_url }}
          USER_EMAIL: ${{ matrix.user_email }}
          USER_PASSWORD: ${{ matrix.user_password }}
        run: |
          bash .github/scripts/full-suite-dashboard.sh

      # ──────────────────────────────────────────────
      # Extract this group's FAILED tests (FQCN#method) from its surefire
      # reports, so the summary job can merge them into a dated re-runnable
      # suite. Runs even if tests failed (continue-on-error above).
      # ──────────────────────────────────────────────
      - name: Extract failed tests
        if: always()
        run: |
          mkdir -p failed-lists
          python3 .github/scripts/collect-failed-tests.py --extract-only \
            --reports-dir target/surefire-reports \
            --out "failed-lists/${{ matrix.group }}.txt"

      - name: Upload failed-tests list
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failed-list-s2-${{ matrix.group }}
          path: failed-lists/${{ matrix.group }}.txt
          if-no-files-found: ignore

      # ──────────────────────────────────────────────
      # Write Result JSON (for summary job)
      # ──────────────────────────────────────────────
      - name: Write result JSON
        if: always()
        env:
          GROUP_KEY: ${{ matrix.group }}
          GROUP_NAME: ${{ matrix.name }}
          EXPECTED: ${{ matrix.tests }}
        run: |
          mkdir -p results

          export R_PASSED=${SUITE_PASSED:-0}
          export R_FAILED=${SUITE_FAILED:-0}
          export R_SKIPPED=${SUITE_SKIPPED:-0}
          export R_TOTAL=$((R_PASSED + R_FAILED + R_SKIPPED))
          export R_DURATION=${SUITE_DURATION:-0}

          if [ "$R_TOTAL" -eq 0 ]; then
            export R_STATUS="error"
          elif [ "$R_FAILED" -gt 0 ]; then
            export R_STATUS="failed"
          else
            export R_STATUS="passed"
          fi

          python3 -c "
          import json, os
          data = {
              'group': os.environ.get('GROUP_KEY', ''),
              'name': os.environ.get('GROUP_NAME', ''),
              'expected_tests': int(os.environ.get('EXPECTED', '0')),
              'passed': int(os.environ.get('R_PASSED', '0')),
              'failed': int(os.environ.get('R_FAILED', '0')),
              'skipped': int(os.environ.get('R_SKIPPED', '0')),
              'total': int(os.environ.get('R_TOTAL', '0')),
              'status': os.environ.get('R_STATUS', 'error'),
              'duration_seconds': int(os.environ.get('R_DURATION', '0'))
          }
          with open(f\"results/{data['group']}.json\", 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

      # ──────────────────────────────────────────────
      # Per-Group Step Summary
      # ──────────────────────────────────────────────
      - name: Group summary
        if: always()
        env:
          GROUP_NAME: ${{ matrix.name }}
        run: |
          R_PASSED=${SUITE_PASSED:-0}
          R_FAILED=${SUITE_FAILED:-0}
          R_SKIPPED=${SUITE_SKIPPED:-0}
          R_DURATION=${SUITE_DURATION:-0}

          ICON="✅"
          [ "$R_FAILED" -gt 0 ] && ICON="❌"
          [ "$((R_PASSED + R_FAILED + R_SKIPPED))" -eq 0 ] && ICON="⚠️"

          {
            echo "## ${ICON} ${GROUP_NAME}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Passed | ${R_PASSED} |"
            echo "| Failed | ${R_FAILED} |"
            echo "| Skipped | ${R_SKIPPED} |"
            echo "| Duration | ${R_DURATION}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Upload Artifacts (unique names per group)
      # ──────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reports-s2-${{ matrix.group }}
          path: |
            reports/detail-report/
            reports/groups/
            test-output/screenshots/
            test-output/visual-diffs/
          retention-days: 30
          # NOTE: target/surefire-reports/ intentionally excluded —
          # reports/groups/ already contains the copy (via dashboard script).
          # Including both caused every test to appear twice in the
          # consolidated report (duplicate testng-results.xml files).

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: result-s2-${{ matrix.group }}
          path: results/${{ matrix.group }}.json
          retention-days: 7

  # ============================================================
  # Phase 2: Aggregate Results from All Groups
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: test-group
    # Run on test-group success OR failure (to aggregate failures), but NOT when test-group was
    # skipped (no functional modules ticked) — with no result artifacts the aggregate would report
    # "No test results collected" → overall_status=error and fail the run spuriously.
    if: ${{ always() && needs.test-group.result != 'skipped' }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Download all result JSONs
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: result-s2-*
          path: results
          merge-multiple: true

      - name: Download all test reports
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: reports-s2-*
          path: all-reports

      # ──────────────────────────────────────────────
      # Build + commit the dated failed-tests suite (re-runnable locally,
      # tracked over time). Merges all groups' failed lists; --merge unions
      # with any suite already committed today (so Parallel Suite 1 and 2
      # both feed the same dated file). reset-to-origin + rebuild + retry
      # makes concurrent pushes from the two pipelines safe.
      # ──────────────────────────────────────────────
      - name: Download failed-tests lists
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: failed-list-s2-*
          path: failed-lists-dl
          merge-multiple: true

      - name: Build + commit dated failed-tests suite
        if: always()
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          LABEL="Parallel Suite 2 (run ${{ github.run_number }})"
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main   # adopt latest (untracked failed-lists-dl survives)
            python3 .github/scripts/collect-failed-tests.py --build \
              --lists-dir failed-lists-dl --date "$DATE" --label "$LABEL" --merge
            git add failed-suites/
            if git diff --cached --quiet; then echo "No failed-tests changes."; break; fi
            git commit -m "[bot] failed-tests suite ${DATE} — Parallel Suite 2"
            if git push origin HEAD:main; then echo "Pushed failed-tests suite."; break; fi
            echo "push race (attempt $attempt) — retrying"; sleep $(( (RANDOM % 5) + 2 ))
          done

      - name: Upload failed-tests suite artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failed-tests-suite-s2
          path: failed-suites/
          if-no-files-found: ignore

      - name: Aggregate results
        id: aggregate
        run: |
          echo ""
          echo "================================================================"
          echo "  PARALLEL SUITE 2 — Aggregating Results"
          echo "================================================================"
          echo ""

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_SKIPPED=0
          TOTAL_TESTS=0
          GROUP_COUNT=0

          for json in results/*.json; do
            [ -f "$json" ] || continue
            GROUP_COUNT=$((GROUP_COUNT + 1))

            eval "$(python3 -c "
          import json, os
          d = json.load(open('$json'))
          print(f\"NAME='{d[\"name\"]}'\"  )
          print(f\"PASSED={d['passed']}\"  )
          print(f\"FAILED={d['failed']}\"  )
          print(f\"SKIPPED={d['skipped']}\")
          print(f\"DURATION={d['duration_seconds']}\")
          print(f\"STATUS={d['status']}\"  )
          ")"

            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            TOTAL_TESTS=$((TOTAL_TESTS + PASSED + FAILED + SKIPPED))

            ICON="✅"; [ "$STATUS" = "failed" ] && ICON="❌"; [ "$STATUS" = "error" ] && ICON="⚠️"
            printf "  %s  %-35s  P:%-4s F:%-4s S:%-4s  %ss\n" \
              "$ICON" "$NAME" "$PASSED" "$FAILED" "$SKIPPED" "$DURATION"
          done

          echo ""
          echo "────────────────────────────────────────────"
          echo "  TOTAL:  Passed=$TOTAL_PASSED  Failed=$TOTAL_FAILED  Skipped=$TOTAL_SKIPPED"
          echo "  Groups: $GROUP_COUNT / 9 completed"
          echo "────────────────────────────────────────────"

          {
            echo "total_passed=${TOTAL_PASSED}"
            echo "total_failed=${TOTAL_FAILED}"
            echo "total_skipped=${TOTAL_SKIPPED}"
            echo "total_tests=${TOTAL_TESTS}"
            echo "group_count=${GROUP_COUNT}"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "overall_status=error" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "overall_status=partial" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=passed" >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────────
      # Consolidated Client Report (Single HTML)
      # ──────────────────────────────────────────────
      - name: Generate consolidated client report
        if: always()
        id: report
        env:
          SEND_EMAIL_ENABLED: ${{ inputs.send_email && secrets.EMAIL_PASSWORD != '' && 'true' || 'false' }}
          EMAIL_FROM: "abhiyant.singh@egalvanic.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "abhiyant.singh@egalvanic.com"
        run: |
          python3 .github/scripts/consolidated-report.py \
            all-reports \
            reports/client-report/Consolidated_Client_Report_Suite2.html

      # ──────────────────────────────────────────────
      # Generate CLIENT-READY report from the consolidated one
      # (executive summary + feature-area coverage + known-issues split)
      # ──────────────────────────────────────────────
      - name: Generate client-ready report
        if: always()
        run: |
          python3 .github/scripts/client-report.py \
            reports/client-report/Consolidated_Client_Report_Suite2.html \
            reports/client-report/Client_Report_Polished_Suite2.html

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-client-report-suite2
          path: |
            reports/client-report/Consolidated_Client_Report_Suite2.html
            reports/client-report/Client_Report_Polished_Suite2.html
          retention-days: 30

      # ──────────────────────────────────────────────
      # Consolidated DETAILED report — every module's full Detailed Report
      # (steps + INLINE base64 screenshots) bundled into one navigable index.
      # LARGE (tens of MB) -> uploaded as an ARTIFACT ONLY, never emailed.
      # The email (consolidated-report.py) still sends only the small Client report.
      # ──────────────────────────────────────────────
      - name: Generate consolidated detailed report
        if: always()
        run: |
          python3 .github/scripts/consolidated-detailed-report.py \
            all-reports reports/consolidated-detailed \
            --title "Consolidated Detailed Report — Parallel Suite 2 (run ${{ github.run_number }})" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Upload consolidated detailed report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-detailed-report-suite2
          path: reports/consolidated-detailed/
          retention-days: 30
          if-no-files-found: ignore

      # ──────────────────────────────────────────────
      # Client-facing Curated Bug Report (8 validated bugs)
      # Uploaded as a SEPARATE artifact so the client package
      # includes both the run results AND the consolidated PDF.
      # ──────────────────────────────────────────────
      - name: Upload curated bug report PDF
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: curated-bug-report-client
          path: |
            bug pdf/eGalvanic_Deep_Bug_Report_20_April_2026.pdf
            bug pdf/eGalvanic_Deep_Bug_Report_20_April_2026.html
          retention-days: 90
          if-no-files-found: warn

      # ──────────────────────────────────────────────
      # Combined Step Summary
      # ──────────────────────────────────────────────
      - name: Generate combined summary
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          TOTAL_SKIPPED: ${{ steps.aggregate.outputs.total_skipped }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          HEADER="### ALL TESTS PASSED"
          [ "${STATUS}" = "partial" ] && HEADER="### SOME TESTS FAILED"
          [ "${STATUS}" = "error" ] && HEADER="### ERROR"

          {
            echo "## Parallel Suite 2 — Combined Results"
            echo ""
            echo "${HEADER}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total | ${TOTAL_TESTS} |"
            echo "| Passed | ${TOTAL_PASSED} |"
            echo "| Failed | ${TOTAL_FAILED} |"
            echo "| Skipped | ${TOTAL_SKIPPED} |"
            echo "| Groups | ${GROUP_COUNT} / 9 |"
            echo ""
            echo "### Individual Group Results"
            echo ""
            echo "| Group | Status | Passed | Failed | Skipped | Duration |"
            echo "|-------|--------|--------|--------|---------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for json in results/*.json; do
            [ -f "$json" ] || continue
            python3 -c "
          import json
          d = json.load(open('$json'))
          icon = '✅' if d['status'] == 'passed' else '❌' if d['status'] == 'failed' else '⚠️'
          s = d['duration_seconds']
          dur = f'{s // 60}m {s % 60}s' if s >= 60 else f'{s}s'
          print(f\"| {d['name']} | {icon} {d['status']} | {d['passed']} | {d['failed']} | {d['skipped']} | {dur} |\")
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          done

          {
            echo ""
            echo "### Reports"
            echo "- **Client-Polished Report (SEND TO CLIENT)**: \`Client_Report_Polished_Suite2.html\` inside artifact \`consolidated-client-report-suite2\` — executive summary, feature-area coverage, separates known-issues from functional failures"
            echo "- **Curated Bug Report**: PDF + HTML of the 8 validated bugs — artifact \`curated-bug-report-client\` (90-day retention)"
            echo "- **Consolidated Technical Report**: \`Consolidated_Client_Report_Suite2.html\` (same artifact as above) — full test-level detail for engineering"
            echo "- **Per-group details**: Individual reports in \`reports-s2-{group-name}\` artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Final Pass/Fail
      # ──────────────────────────────────────────────
      - name: Check overall result
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          echo ""
          if [ "${STATUS}" = "passed" ]; then
            echo "ALL ${TOTAL_TESTS} TESTS PASSED across ${GROUP_COUNT} groups"
          elif [ "${STATUS}" = "partial" ]; then
            echo "SOME TESTS FAILED: ${TOTAL_PASSED}/${TOTAL_TESTS} passed, ${TOTAL_FAILED} failed"
            echo "Check individual group artifacts for details"
          else
            echo "ERROR: No test results collected"
            exit 1
          fi

  # ============================================================
  # Opt-in RBAC jobs (driven by the workflow_dispatch dropdowns).
  # Default 'skip' → these don't run on a normal Parallel Suite 2 dispatch.
  # They run in parallel and appear in the jobs panel when selected.
  # ============================================================
  rbac-api:
    name: "RBAC — API (contract + matrix + edit enforcement)"
    if: ${{ inputs.rbac_api }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1
      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Compile
        run: mvn -B -q compile test-compile
      - name: Stagger start (offset from the matrix login storm)
        run: sleep 25
      - name: Run RBAC API suite
        id: run
        continue-on-error: true
        run: mvn -B test -DsuiteXmlFile=testng-rbac-permissions.xml -DSEND_EMAIL_ENABLED=false
      - name: Summarize
        if: always()
        run: bash .github/scripts/rbac-summary.sh "RBAC — API"
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rbac-api-reports-s2
          path: |
            target/surefire-reports/
            reports/detail-report/
          retention-days: 14
      - name: Fail job if any test failed
        if: always()
        run: |
          if [ "${{ steps.run.outcome }}" = "failure" ]; then echo "::error::Maven reported RBAC API failures"; exit 1; fi
          if [ "${NO_RESULTS:-0}" = "1" ]; then echo "::error::no results"; exit 1; fi
          if [ "${FAIL_COUNT:-0}" != "0" ]; then echo "::error::${FAIL_COUNT} RBAC API test(s) failed"; exit 1; fi
          echo "RBAC API passed (skips expected for unprovisioned/mis-provisioned roles)."

  rbac-full:
    name: "RBAC — All (login + edit + gating + API)"
    # Run AFTER the matrix (not concurrently): the 6 RBAC browser logins were flaky while the full
    # matrix hammered the same QA app. Running alone (like the green standalone rbac.yml) removes the
    # contention. always() so it still runs if a matrix group failed.
    needs: test-group
    if: ${{ always() && inputs.rbac_all }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1
      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'
      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Compile
        run: mvn -B -q compile test-compile
      - name: Run full RBAC suite (headless)
        id: run
        continue-on-error: true
        run: mvn -B test -DsuiteXmlFile=testng-rbac-all.xml -Dheadless=true -DSEND_EMAIL_ENABLED=false
      - name: Summarize
        if: always()
        run: bash .github/scripts/rbac-summary.sh "RBAC — All"
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rbac-full-reports-s2
          path: |
            target/surefire-reports/
            reports/detail-report/
            test-output/screenshots/
          retention-days: 14
      - name: Fail job if any test failed
        if: always()
        run: |
          if [ "${{ steps.run.outcome }}" = "failure" ]; then echo "::error::Maven reported RBAC failures"; exit 1; fi
          if [ "${NO_RESULTS:-0}" = "1" ]; then echo "::error::no results"; exit 1; fi
          if [ "${FAIL_COUNT:-0}" != "0" ]; then echo "::error::${FAIL_COUNT} RBAC test(s) failed"; exit 1; fi
          echo "RBAC (all) passed (skips expected for unprovisioned/mis-provisioned roles)."
