name: Parallel Suite 2 — Curated Bug Verification + AI + Smoke + Load + BCES-IQ

# ============================================================
# PARALLEL SUITE 2 — 9 Groups Running Simultaneously
# ============================================================
#
# Complementary suite to parallel-suite.yml. Runs the curated 8-bug
# regression gate (client-facing), lighter AI-powered and exploratory
# test modules, plus a cross-tenant smoke for acme.bces-iq.com.
#
# Groups (10 parallel jobs):
#   Group  1: Curated Bug Verification     (  8 TCs)  ~15 min  [CLIENT]
#   Group  2: Smoke Suites                 ( 37 TCs)  ~10 min
#   Group  3: Load + API + Critical Path   ( 62 TCs)  ~15 min
#   Group  4: AI Form Creation             ( 56 TCs)  ~20 min
#   Group  5: Monkey Exploratory           (  4 TCs)  ~10 min
#   Group  6: Visual Regression            (  7 TCs)  ~10 min
#   Group  7: AI Page Analyzer             (  3 TCs)  ~10 min
#   Group  8: BCES-IQ Tenant Smoke         (  3 TCs)  ~5 min   [NEW TENANT]
#   Group  9: Documentation-Inspired Tests ( 17 TCs)  ~10 min  [NEW 2026-04-27]
#   Group 10: Quality Gates (All Pages)    (225 TCs)  ~60 min  [NEW 2026-06-03: a11y+perf+assets+responsive+detail-tabs across 59 routes (incl. Settings + Reporting hub deep-views) + deep interaction on thin modules]
#
# Total: ~422 TCs across 10 default groups.
#
# Opt-in modules — enter their tokens in the single `extra_modules` text field
# (space/comma separated; "all" enables every one). OFF by default:
#   engineering    Asset Engineering (386 TCs)
#   arc_flash      Arc Flash Readiness (123 TCs — 7 groups, NEW 2026-06-30)
#   api            API testing (REST contract + List-API pagination audit + network capture, NEW 2026-07-01)
#   rbac_api       RBAC — API (606 TCs)
#   rbac_frontend  RBAC — Front-End (303 TCs)
#   admin_pm       Admin — PM template config ZP-323 (12 TCs)
#   work_type      Work Type Matrix ZP-3000 Services V2 (NEW 2026-07-22 — 5 groups, 411 green TCs:
#                  all 14 Work Type options × API-contract / create-dialog / Z1-fixture-detail /
#                  create-E2E / edge; pins to site Z1; known-product-bug tripwires excluded via
#                  the suite XMLs' own group filter)
# (These 7 were separate checkboxes before 2026-07-22; folded into one field because GitHub's
#  workflow_dispatch UI only renders the first 10 inputs, which was hiding the later toggles.)
#   Arc Flash also runs in parallel-suite.yml's dashboard-bughunt group; here it is opt-in to avoid double-running.
#
# The BCES-IQ group runs the SAME test framework against
# https://acme.bces-iq.com using a dedicated BCES-IQ user, via env-var
# overrides on BASE_URL / USER_EMAIL / USER_PASSWORD. The username and
# password come from the BCES_IQ_USER / BCES_IQ_PASSWORD repo secrets
# (set manually in GitHub settings) — never committed. If the secrets are
# missing, the bces-iq login simply fails (no plaintext creds in the repo).
#
# The client-facing bug report PDF is uploaded as an artifact of the
# summary job so it can be attached to client communications.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      # ── Module groups: checkboxes — tick the ones you want, untick to skip.
      #    All default ON, so a plain "Run workflow" runs everything (as before).
      #    Only the ticked modules spin up runners (built into a dynamic matrix). ──
      curated_bug:
        description: 'Curated Bug Verification (8 client-facing regression TCs)'
        type: boolean
        default: true
      smoke:
        description: 'Smoke — acme.qa Smoke Suites + BCES-IQ tenant smoke'
        type: boolean
        default: true
      load_api:
        description: 'Load + API + Critical Path'
        type: boolean
        default: true
      ai:
        description: 'AI — Form Creation + Page Analyzer'
        type: boolean
        default: true
      exploratory:
        description: 'Exploratory — Monkey + Visual Regression'
        type: boolean
        default: true
      quality_gates:
        description: 'Quality Gates (All Pages — a11y/perf/responsive, 225 TCs)'
        type: boolean
        default: true
      doc_inspired:
        description: 'Documentation-Inspired Tests'
        type: boolean
        default: true
      # ── Heavy opt-in modules — ONE free-text field (GitHub's workflow_dispatch UI
      #    only renders the first 10 inputs; folding these 7 booleans into a single
      #    string keeps every input visible). Space/comma-separated tokens, any of:
      #      engineering  arc_flash  api  rbac_api  rbac_frontend  admin_pm  work_type
      #    ("all" enables all seven). Dashes are accepted too (arc-flash, work-type).
      #    Examples: "work_type"  ·  "work_type,arc_flash"  ·  "all"  ·  "" (none). ──
      extra_modules:
        description: 'Extra opt-in modules (space/comma tokens): engineering arc_flash api rbac_api rbac_frontend admin_pm work_type — or "all". Blank = none.'
        required: false
        type: string
        default: ''
      # ── Delivery. ──
      send_email:
        description: 'Send email report after completion'
        type: boolean
        default: true
      pause_scale:
        description: 'Global pause() scale (0.1-1.0). 1.0 = unchanged; 0.5 halves every Thread.sleep. Lower gradually and confirm the run stays green.'
        required: false
        type: string
        default: '1.0'

concurrency:
  group: parallel-suite-2
  cancel-in-progress: false

# The summary job commits the dated failed-tests suite back to main
# (same [bot] pattern as daily-ai-analysis.yml).
permissions:
  contents: write

jobs:
  # ============================================================
  # Phase 0: Build the run-matrix from the selected module checkboxes.
  # Each checkbox maps to one or more matrix groups; only ticked ones run.
  # ============================================================
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      any: ${{ steps.build.outputs.any }}
    steps:
      - name: Build dynamic matrix from selected modules
        id: build
        env:
          CURATED: ${{ inputs.curated_bug }}
          SMOKE: ${{ inputs.smoke }}
          LOAD_API: ${{ inputs.load_api }}
          AI: ${{ inputs.ai }}
          EXPLORATORY: ${{ inputs.exploratory }}
          QUALITY: ${{ inputs.quality_gates }}
          DOC: ${{ inputs.doc_inspired }}
          # Heavy opt-in modules arrive as one free-text string; derived into flags below.
          EXTRA: ${{ inputs.extra_modules }}
        run: |
          # Catalog of all groups; each tagged with the checkbox (toggle) that enables it.
          # Merged checkboxes (smoke, ai, exploratory) map to >1 group.
          CATALOG='[
            {"toggle":"CURATED","group":"curated-bug-verification","name":"Curated Bug Verification","xml":"deep-bug-verification-testng.xml","tests":8,"stagger":0},
            {"toggle":"SMOKE","group":"smoke","name":"Smoke Suites","xml":"smoke-testng.xml","tests":37,"stagger":10},
            {"toggle":"SMOKE","group":"bces-iq-smoke","name":"BCES-IQ Tenant Smoke","xml":"smoke-bces-iq-testng.xml","tests":3,"stagger":70,"base_url":"https://acme.bces-iq.com"},
            {"toggle":"LOAD_API","group":"load-api","name":"Load + API + Critical Path","xml":"suite-load-api.xml","tests":62,"stagger":20},
            {"toggle":"API","group":"api-rest-contract","name":"API — REST contract + List-API pagination audit","xml":"suite-api.xml","tests":35,"stagger":22},
            {"toggle":"API","group":"api-network","name":"API — network capture + duplicate-call + UI/API consistency","xml":"suite-network-api.xml","tests":3,"stagger":24},
            {"toggle":"AI","group":"ai-form","name":"AI Form Creation","xml":"suite-ai-form.xml","tests":56,"stagger":30},
            {"toggle":"AI","group":"ai-analyzer","name":"AI Page Analyzer","xml":"suite-ai-analyzer.xml","tests":3,"stagger":60},
            {"toggle":"EXPLORATORY","group":"monkey","name":"Monkey Exploratory","xml":"suite-monkey.xml","tests":4,"stagger":40},
            {"toggle":"EXPLORATORY","group":"visual-regression","name":"Visual Regression","xml":"suite-visual.xml","tests":7,"stagger":50},
            {"toggle":"DOC","group":"doc-inspired","name":"Documentation-Inspired Tests","xml":"suite-doc-inspired.xml","tests":17,"stagger":65},
            {"toggle":"QUALITY","group":"quality-gates","name":"Quality Gates (All Pages)","xml":"suite-quality-gates.xml","tests":225,"stagger":68},
            {"toggle":"ENGINEERING","group":"asset-engineering","name":"Asset Engineering / Trip Config","xml":"suite-asset-engineering.xml","tests":12,"stagger":72},
            {"toggle":"ENGINEERING","group":"asset-transformer","name":"Asset Engineering / Transformer","xml":"suite-asset-transformer.xml","tests":10,"stagger":74},
            {"toggle":"ENGINEERING","group":"asset-engineering-matrix","name":"Asset Engineering / per-class matrix","xml":"suite-asset-engineering-matrix.xml","tests":39,"stagger":76},
            {"toggle":"ENGINEERING","group":"asset-mains-config","name":"Asset Engineering / Mains Config","xml":"suite-asset-mains-config.xml","tests":17,"stagger":78},
            {"toggle":"ENGINEERING","group":"asset-engineering-exhaustive","name":"Asset Engineering / exhaustive options","xml":"suite-asset-engineering-exhaustive.xml","tests":308,"stagger":80},
            {"toggle":"ARC_FLASH","group":"arc-flash","name":"Arc Flash — Overview / Eng-Mode / Asset Details","xml":"suite-arc-flash.xml","tests":16,"stagger":84},
            {"toggle":"ARC_FLASH","group":"arc-flash-connections","name":"Arc Flash — Source/Target + Connection Details","xml":"suite-arc-flash-connections.xml","tests":9,"stagger":86},
            {"toggle":"ARC_FLASH","group":"arc-flash-platform","name":"Arc Flash — Platform (Role / SLD / Responsive / Report)","xml":"suite-arc-flash-platform.xml","tests":5,"stagger":88},
            {"toggle":"ARC_FLASH","group":"arc-flash-grid-matrix","name":"Arc Flash — Grid Column Matrix (presence + sort)","xml":"suite-arc-flash-grid-matrix.xml","tests":46,"stagger":92},
            {"toggle":"ARC_FLASH","group":"arc-flash-asset-class","name":"Arc Flash — Asset-Class Matrix","xml":"suite-arc-flash-asset-class.xml","tests":30,"stagger":94},
            {"toggle":"ARC_FLASH","group":"arc-flash-role","name":"Arc Flash — Role View Matrix","xml":"suite-arc-flash-role.xml","tests":8,"stagger":96},
            {"toggle":"ARC_FLASH","group":"arc-flash-filters-pagination","name":"Arc Flash — Filters + Pagination Matrix","xml":"suite-arc-flash-filters-pagination.xml","tests":9,"stagger":98},
            {"toggle":"ARC_FLASH","group":"arc-flash-engineering","name":"Arc Flash — Engineering E2E (CB library match → recalc)","xml":"suite-arc-flash-engineering.xml","tests":8,"stagger":100},
            {"toggle":"RBAC_API","group":"rbac-api","name":"RBAC — API","xml":"suite-rbac-api.xml","tests":606,"stagger":82},
            {"toggle":"RBAC_FRONTEND","group":"rbac-frontend","name":"RBAC — Front-End (UI)","xml":"suite-rbac-frontend.xml","tests":303,"stagger":90},
            {"toggle":"ADMIN_PM","group":"admin-pm","name":"Admin — PM template config (ZP-323)","xml":"suite-admin-pm.xml","tests":12,"stagger":102},
            {"toggle":"WORK_TYPE","group":"work-type-api","name":"Work Type — API Catalog Contract","xml":"suite-worktype-api.xml","tests":81,"stagger":104},
            {"toggle":"WORK_TYPE","group":"work-type-detail","name":"Work Type — Detail Contract (Z1 fixtures)","xml":"suite-worktype-detail.xml","tests":102,"stagger":106},
            {"toggle":"WORK_TYPE","group":"work-type-dialog","name":"Work Type — Create Dialog Matrix","xml":"suite-worktype-dialog.xml","tests":153,"stagger":108},
            {"toggle":"WORK_TYPE","group":"work-type-create-e2e","name":"Work Type — Create E2E Matrix","xml":"suite-worktype-create-e2e.xml","tests":42,"stagger":110},
            {"toggle":"WORK_TYPE","group":"work-type-edge","name":"Work Type — Auto-Schedule & Edge","xml":"suite-worktype-edge.xml","tests":33,"stagger":112}
          ]'
          # Derive the heavy opt-in flags from the free-text EXTRA field. Normalize to
          # one lowercase token per line (dashes -> underscores); "all" enables all seven.
          EXTRA_NORM=$(printf '%s' "${EXTRA:-}" | tr 'A-Z' 'a-z' | tr ' ,;|\t' '\n' | sed 's/-/_/g' | sed '/^$/d')
          has() { printf '%s\n' "$EXTRA_NORM" | grep -qx "$1" || printf '%s\n' "$EXTRA_NORM" | grep -qx "all"; }
          ENGINEERING=false;   has engineering   && ENGINEERING=true
          ARC_FLASH=false;     has arc_flash     && ARC_FLASH=true
          API=false;           has api           && API=true
          RBAC_API=false;      has rbac_api      && RBAC_API=true
          RBAC_FRONTEND=false; has rbac_frontend && RBAC_FRONTEND=true
          ADMIN_PM=false;      has admin_pm      && ADMIN_PM=true
          WORK_TYPE=false;     has work_type     && WORK_TYPE=true
          echo "Extra modules requested: '${EXTRA:-}' -> ENGINEERING=$ENGINEERING ARC_FLASH=$ARC_FLASH API=$API RBAC_API=$RBAC_API RBAC_FRONTEND=$RBAC_FRONTEND ADMIN_PM=$ADMIN_PM WORK_TYPE=$WORK_TYPE"
          ENABLED=$(for t in CURATED SMOKE LOAD_API AI EXPLORATORY QUALITY DOC ENGINEERING ARC_FLASH API RBAC_API RBAC_FRONTEND ADMIN_PM WORK_TYPE; do
                      [ "${!t}" = "true" ] && echo "$t"; done | jq -R . | jq -cs .)
          SEL=$(echo "$CATALOG" | jq -c --argjson en "$ENABLED" \
                  '[ .[] | select(.toggle as $t | $en | index($t)) | del(.toggle) ]')
          echo "Enabled toggles: $ENABLED"
          echo "Selected groups: $(echo "$SEL" | jq -c '[.[].group]')"
          echo "matrix=$SEL" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$SEL" | jq 'length')" -gt 0 ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No module checkboxes selected (incl. RBAC) — nothing to run."
          fi

  # ============================================================
  # Phase 1: Run each SELECTED group in parallel
  # ============================================================
  test-group:
    needs: prep
    if: ${{ needs.prep.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 480

    strategy:
      fail-fast: false
      max-parallel: 11

      # Dynamic: only the modules ticked in the dispatch form (built by `prep`).
      # The full group catalog (incl. the BCES-IQ cross-tenant overrides) lives in
      # the `prep` job above; edit it there to add/rename groups.
      matrix:
        include: ${{ fromJSON(needs.prep.outputs.matrix) }}

    name: "${{ matrix.name }} (${{ matrix.tests }} TCs)"

    steps:
      # ──────────────────────────────────────────────
      # Environment Setup
      # ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: |
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p test-output/visual-baselines
          mkdir -p test-output/visual-diffs
          mkdir -p reports/detail-report
          mkdir -p reports/client-report
          mkdir -p reports/groups

      - name: Compile project
        run: |
          echo "Compiling project..."
          mvn compile test-compile -B -q
          echo "Compilation successful"

      # ──────────────────────────────────────────────
      # Stagger Login — Avoid Simultaneous Logins
      # ──────────────────────────────────────────────
      - name: Stagger login delay
        env:
          STAGGER_SECONDS: ${{ matrix.stagger }}
        run: |
          if [ "${STAGGER_SECONDS}" -gt 0 ]; then
            echo "Waiting ${STAGGER_SECONDS}s before starting tests (stagger login)..."
            sleep "${STAGGER_SECONDS}"
          fi

      # ──────────────────────────────────────────────
      # Run Tests via Dashboard Script (clean UI)
      # ──────────────────────────────────────────────
      - name: Run tests with dashboard
        id: run_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          FULL_SUITE_GROUP: ${{ matrix.group }}
          # Speed knob — inherited by the forked Surefire JVM, read by BaseTest.pause().
          PAUSE_SCALE: ${{ github.event.inputs.pause_scale || '1.0' }}
          # Per-matrix tenant overrides. The BASE_URL comes from the matrix entry;
          # the BCES-IQ tenant credentials come from repo SECRETS (never committed) and
          # are injected ONLY for the bces-iq-smoke group. Empty string is treated as
          # "use default" by AppConstants#getEnv(), so all other (acme.qa) jobs
          # transparently fall through to the standard acme.qa credentials.
          BASE_URL: ${{ matrix.base_url }}
          USER_EMAIL: ${{ matrix.group == 'bces-iq-smoke' && secrets.BCES_IQ_USER || '' }}
          USER_PASSWORD: ${{ matrix.group == 'bces-iq-smoke' && secrets.BCES_IQ_PASSWORD || '' }}
        run: |
          bash .github/scripts/full-suite-dashboard.sh

      # ──────────────────────────────────────────────
      # Extract this group's FAILED tests (FQCN#method) from its surefire
      # reports, so the summary job can merge them into a dated re-runnable
      # suite. Runs even if tests failed (continue-on-error above).
      # ──────────────────────────────────────────────
      - name: Extract failed tests
        if: always()
        run: |
          mkdir -p failed-lists
          python3 .github/scripts/collect-failed-tests.py --extract-only \
            --reports-dir target/surefire-reports \
            --out "failed-lists/${{ matrix.group }}.txt"

      - name: Upload failed-tests list
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failed-list-s2-${{ matrix.group }}
          path: failed-lists/${{ matrix.group }}.txt
          if-no-files-found: ignore

      # ──────────────────────────────────────────────
      # Write Result JSON (for summary job)
      # ──────────────────────────────────────────────
      - name: Write result JSON
        if: always()
        env:
          GROUP_KEY: ${{ matrix.group }}
          GROUP_NAME: ${{ matrix.name }}
          EXPECTED: ${{ matrix.tests }}
        run: |
          mkdir -p results

          export R_PASSED=${SUITE_PASSED:-0}
          export R_FAILED=${SUITE_FAILED:-0}
          export R_SKIPPED=${SUITE_SKIPPED:-0}
          export R_TOTAL=$((R_PASSED + R_FAILED + R_SKIPPED))
          export R_DURATION=${SUITE_DURATION:-0}

          if [ "$R_TOTAL" -eq 0 ]; then
            export R_STATUS="error"
          elif [ "$R_FAILED" -gt 0 ]; then
            export R_STATUS="failed"
          else
            export R_STATUS="passed"
          fi

          python3 -c "
          import json, os
          data = {
              'group': os.environ.get('GROUP_KEY', ''),
              'name': os.environ.get('GROUP_NAME', ''),
              'expected_tests': int(os.environ.get('EXPECTED', '0')),
              'passed': int(os.environ.get('R_PASSED', '0')),
              'failed': int(os.environ.get('R_FAILED', '0')),
              'skipped': int(os.environ.get('R_SKIPPED', '0')),
              'total': int(os.environ.get('R_TOTAL', '0')),
              'status': os.environ.get('R_STATUS', 'error'),
              'duration_seconds': int(os.environ.get('R_DURATION', '0'))
          }
          with open(f\"results/{data['group']}.json\", 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

      # ──────────────────────────────────────────────
      # Per-Group Step Summary
      # ──────────────────────────────────────────────
      - name: Group summary
        if: always()
        env:
          GROUP_NAME: ${{ matrix.name }}
        run: |
          R_PASSED=${SUITE_PASSED:-0}
          R_FAILED=${SUITE_FAILED:-0}
          R_SKIPPED=${SUITE_SKIPPED:-0}
          R_DURATION=${SUITE_DURATION:-0}

          ICON="✅"
          [ "$R_FAILED" -gt 0 ] && ICON="❌"
          [ "$((R_PASSED + R_FAILED + R_SKIPPED))" -eq 0 ] && ICON="⚠️"

          {
            echo "## ${ICON} ${GROUP_NAME}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Passed | ${R_PASSED} |"
            echo "| Failed | ${R_FAILED} |"
            echo "| Skipped | ${R_SKIPPED} |"
            echo "| Duration | ${R_DURATION}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Upload Artifacts (unique names per group)
      # ──────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reports-s2-${{ matrix.group }}
          path: |
            reports/detail-report/
            reports/groups/
            reports/*.md
            test-output/screenshots/
            test-output/visual-diffs/
          retention-days: 30
          # NOTE: target/surefire-reports/ intentionally excluded —
          # reports/groups/ already contains the copy (via dashboard script).
          # Including both caused every test to appear twice in the
          # consolidated report (duplicate testng-results.xml files).

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: result-s2-${{ matrix.group }}
          path: results/${{ matrix.group }}.json
          retention-days: 7

  # ============================================================
  # Phase 2: Aggregate Results from All Groups
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: test-group
    # Run on test-group success OR failure (to aggregate failures), but NOT when test-group was
    # skipped (no functional modules ticked) — with no result artifacts the aggregate would report
    # "No test results collected" → overall_status=error and fail the run spuriously.
    if: ${{ always() && needs.test-group.result != 'skipped' }}
    timeout-minutes: 10
    outputs:
      overall_status: ${{ steps.aggregate.outputs.overall_status }}
      total_failed: ${{ steps.aggregate.outputs.total_failed }}
      total_passed: ${{ steps.aggregate.outputs.total_passed }}
      total_skipped: ${{ steps.aggregate.outputs.total_skipped }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Download all result JSONs
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: result-s2-*
          path: results
          merge-multiple: true

      - name: Download all test reports
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: reports-s2-*
          path: all-reports

      # ──────────────────────────────────────────────
      # Build + commit the dated failed-tests suite (re-runnable locally,
      # tracked over time). Merges all groups' failed lists; --merge unions
      # with any suite already committed today (so Parallel Suite 1 and 2
      # both feed the same dated file). reset-to-origin + rebuild + retry
      # makes concurrent pushes from the two pipelines safe.
      # ──────────────────────────────────────────────
      - name: Download failed-tests lists
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: failed-list-s2-*
          path: failed-lists-dl
          merge-multiple: true

      - name: Build + commit dated failed-tests suite
        if: always()
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          LABEL="Parallel Suite 2 (run ${{ github.run_number }})"
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main   # adopt latest (untracked failed-lists-dl survives)
            python3 .github/scripts/collect-failed-tests.py --build \
              --lists-dir failed-lists-dl --date "$DATE" --label "$LABEL" --merge
            git add failed-suites/
            if git diff --cached --quiet; then echo "No failed-tests changes."; break; fi
            git commit -m "[bot] failed-tests suite ${DATE} — Parallel Suite 2"
            if git push origin HEAD:main; then echo "Pushed failed-tests suite."; break; fi
            echo "push race (attempt $attempt) — retrying"; sleep $(( (RANDOM % 5) + 2 ))
          done

      - name: Upload failed-tests suite artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failed-tests-suite-s2
          path: failed-suites/
          if-no-files-found: ignore

      - name: Aggregate results
        id: aggregate
        run: |
          echo ""
          echo "================================================================"
          echo "  PARALLEL SUITE 2 — Aggregating Results"
          echo "================================================================"
          echo ""

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_SKIPPED=0
          TOTAL_TESTS=0
          GROUP_COUNT=0

          for json in results/*.json; do
            [ -f "$json" ] || continue
            GROUP_COUNT=$((GROUP_COUNT + 1))

            eval "$(python3 -c "
          import json, os
          d = json.load(open('$json'))
          print(f\"NAME='{d[\"name\"]}'\"  )
          print(f\"PASSED={d['passed']}\"  )
          print(f\"FAILED={d['failed']}\"  )
          print(f\"SKIPPED={d['skipped']}\")
          print(f\"DURATION={d['duration_seconds']}\")
          print(f\"STATUS={d['status']}\"  )
          ")"

            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            TOTAL_TESTS=$((TOTAL_TESTS + PASSED + FAILED + SKIPPED))

            ICON="✅"; [ "$STATUS" = "failed" ] && ICON="❌"; [ "$STATUS" = "error" ] && ICON="⚠️"
            printf "  %s  %-35s  P:%-4s F:%-4s S:%-4s  %ss\n" \
              "$ICON" "$NAME" "$PASSED" "$FAILED" "$SKIPPED" "$DURATION"
          done

          echo ""
          echo "────────────────────────────────────────────"
          echo "  TOTAL:  Passed=$TOTAL_PASSED  Failed=$TOTAL_FAILED  Skipped=$TOTAL_SKIPPED"
          echo "  Groups: $GROUP_COUNT / 9 completed"
          echo "────────────────────────────────────────────"

          {
            echo "total_passed=${TOTAL_PASSED}"
            echo "total_failed=${TOTAL_FAILED}"
            echo "total_skipped=${TOTAL_SKIPPED}"
            echo "total_tests=${TOTAL_TESTS}"
            echo "group_count=${GROUP_COUNT}"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "overall_status=error" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "overall_status=partial" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=passed" >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────────
      # Consolidated Client Report (Single HTML)
      # ──────────────────────────────────────────────
      - name: Generate consolidated client report
        if: always()
        id: report
        env:
          SEND_EMAIL_ENABLED: ${{ inputs.send_email && secrets.EMAIL_PASSWORD != '' && 'true' || 'false' }}
          EMAIL_FROM: "abhiyant.singh@egalvanic.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "abhiyant.singh@egalvanic.com"
        run: |
          python3 .github/scripts/consolidated-report.py \
            all-reports \
            reports/client-report/Consolidated_Client_Report_Suite2.html

      # ──────────────────────────────────────────────
      # Generate CLIENT-READY report from the consolidated one
      # (executive summary + feature-area coverage + known-issues split)
      # ──────────────────────────────────────────────
      - name: Generate client-ready report
        if: always()
        run: |
          python3 .github/scripts/client-report.py \
            reports/client-report/Consolidated_Client_Report_Suite2.html \
            reports/client-report/Client_Report_Polished_Suite2.html

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-client-report-suite2
          path: |
            reports/client-report/Consolidated_Client_Report_Suite2.html
            reports/client-report/Client_Report_Polished_Suite2.html
          retention-days: 30

      # ──────────────────────────────────────────────
      # Consolidated DETAILED report — every module's full Detailed Report
      # (steps + INLINE base64 screenshots) bundled into one navigable index.
      # LARGE (tens of MB) -> uploaded as an ARTIFACT ONLY, never emailed.
      # The email (consolidated-report.py) still sends only the small Client report.
      # ──────────────────────────────────────────────
      - name: Generate consolidated detailed report
        if: always()
        run: |
          python3 .github/scripts/consolidated-detailed-report.py \
            all-reports reports/consolidated-detailed \
            --title "Consolidated Detailed Report — Parallel Suite 2 (run ${{ github.run_number }})" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Upload consolidated detailed report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-detailed-report-suite2
          path: reports/consolidated-detailed/
          retention-days: 30
          if-no-files-found: ignore

      # ──────────────────────────────────────────────
      # Client-facing Curated Bug Report (8 validated bugs)
      # Uploaded as a SEPARATE artifact so the client package
      # includes both the run results AND the consolidated PDF.
      # ──────────────────────────────────────────────
      - name: Upload curated bug report PDF
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: curated-bug-report-client
          path: |
            bug pdf/eGalvanic_Deep_Bug_Report_20_April_2026.pdf
            bug pdf/eGalvanic_Deep_Bug_Report_20_April_2026.html
          retention-days: 90
          if-no-files-found: warn

      # ──────────────────────────────────────────────
      # Combined Step Summary
      # ──────────────────────────────────────────────
      - name: Generate combined summary
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          TOTAL_SKIPPED: ${{ steps.aggregate.outputs.total_skipped }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          HEADER="### ALL TESTS PASSED"
          [ "${STATUS}" = "partial" ] && HEADER="### SOME TESTS FAILED"
          [ "${STATUS}" = "error" ] && HEADER="### ERROR"

          {
            echo "## Parallel Suite 2 — Combined Results"
            echo ""
            echo "${HEADER}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total | ${TOTAL_TESTS} |"
            echo "| Passed | ${TOTAL_PASSED} |"
            echo "| Failed | ${TOTAL_FAILED} |"
            echo "| Skipped | ${TOTAL_SKIPPED} |"
            echo "| Groups | ${GROUP_COUNT} / 9 |"
            echo ""
            echo "### Individual Group Results"
            echo ""
            echo "| Group | Status | Passed | Failed | Skipped | Duration |"
            echo "|-------|--------|--------|--------|---------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for json in results/*.json; do
            [ -f "$json" ] || continue
            python3 -c "
          import json
          d = json.load(open('$json'))
          icon = '✅' if d['status'] == 'passed' else '❌' if d['status'] == 'failed' else '⚠️'
          s = d['duration_seconds']
          dur = f'{s // 60}m {s % 60}s' if s >= 60 else f'{s}s'
          print(f\"| {d['name']} | {icon} {d['status']} | {d['passed']} | {d['failed']} | {d['skipped']} | {dur} |\")
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          done

          {
            echo ""
            echo "### Reports"
            echo "- **Client-Polished Report (SEND TO CLIENT)**: \`Client_Report_Polished_Suite2.html\` inside artifact \`consolidated-client-report-suite2\` — executive summary, feature-area coverage, separates known-issues from functional failures"
            echo "- **Curated Bug Report**: PDF + HTML of the 8 validated bugs — artifact \`curated-bug-report-client\` (90-day retention)"
            echo "- **Consolidated Technical Report**: \`Consolidated_Client_Report_Suite2.html\` (same artifact as above) — full test-level detail for engineering"
            echo "- **Per-group details**: Individual reports in \`reports-s2-{group-name}\` artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Final Pass/Fail
      # ──────────────────────────────────────────────
      - name: Check overall result
        if: always()
        env:
          STATUS: ${{ steps.aggregate.outputs.overall_status }}
          TOTAL_PASSED: ${{ steps.aggregate.outputs.total_passed }}
          TOTAL_TESTS: ${{ steps.aggregate.outputs.total_tests }}
          TOTAL_FAILED: ${{ steps.aggregate.outputs.total_failed }}
          GROUP_COUNT: ${{ steps.aggregate.outputs.group_count }}
        run: |
          echo ""
          if [ "${STATUS}" = "passed" ]; then
            echo "ALL ${TOTAL_TESTS} TESTS PASSED across ${GROUP_COUNT} groups"
          elif [ "${STATUS}" = "partial" ]; then
            echo "SOME TESTS FAILED: ${TOTAL_PASSED}/${TOTAL_TESTS} passed, ${TOTAL_FAILED} failed"
            echo "Check individual group artifacts for details"
          else
            echo "ERROR: No test results collected"
            exit 1
          fi

  # RBAC now runs as normal matrix groups (rbac-api, rbac-frontend) selected via the
  # rbac_api / rbac_frontend dropdowns — see the CATALOG in `prep`. Running them through
  # the same test-group pipeline means their reports land in reports-s2-* and merge into
  # the consolidated CLIENT + DETAILED reports like every other module (the old standalone
  # rbac-api / rbac-full jobs uploaded separate artifacts that bypassed consolidation).

  # ============================================================
  # Phase 4: Re-run failed tests → SECOND ("after re-run") client report
  # ------------------------------------------------------------
  # If the first pass had any failures, re-run ONLY the just-collected failed tests and produce a
  # SECOND client report showing the FULL suite with each re-run test's fresh outcome substituted in
  # (recovered → PASS, still-broken → FAIL). Result: TWO client reports per run —
  #   • consolidated-client-report-suite2             → BEFORE re-run (the summary job)
  #   • consolidated-client-report-suite2-after-rerun → AFTER re-run (this job)
  # Skipped automatically when the first pass was all-green (overall_status != 'partial').
  # ============================================================
  rerun-failed:
    runs-on: ubuntu-latest
    needs: summary
    if: ${{ always() && needs.summary.outputs.overall_status == 'partial' }}
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Original results from the first pass (with the failures) — the base for the after-rerun report.
      - name: Download original reports (before re-run)
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: reports-s2-*
          path: all-reports

      # The exact set of failures collected from THIS run (failed-tests-latest.xml).
      - name: Download collected failed-tests suite
        uses: actions/download-artifact@v4.3.0
        with:
          name: failed-tests-suite-s2
          path: failed-suites

      - name: Create output dirs
        run: mkdir -p test-output/screenshots reports/detail-report reports/client-report-rerun rerun-results

      - name: Compile
        run: mvn -B -q test-compile

      - name: Re-run failed tests
        id: rerun
        continue-on-error: true
        env:
          SEND_EMAIL_ENABLED: "false"
        run: |
          SUITE="failed-suites/failed-tests-latest.xml"
          if [ ! -f "$SUITE" ]; then
            echo "::warning::No failed-tests-latest.xml found — nothing to re-run."
            exit 0
          fi
          COUNT=$(grep -c 'include name=' "$SUITE" || echo 0)
          echo "Re-running ${COUNT} failed test method(s) from ${SUITE}"
          # -Dheadless=true REQUIRED on the display-less runner (BaseTest reads the 'headless' property
          # → --headless=new); a headed Chrome can't launch on CI and every login would fail.
          mvn -B test -DsuiteXmlFile="$SUITE" -Dheadless=true 2>&1 | tail -40 || true
          # Capture the re-run's FRESH testng results for the override step (separate dir so they don't
          # mix with the downloaded originals).
          cp -r target/surefire-reports/* rerun-results/ 2>/dev/null || true

      - name: Triage still-failing vs recovered
        if: always()
        run: |
          mkdir -p rerun-out
          python3 .github/scripts/collect-failed-tests.py --extract-only \
            --reports-dir target/surefire-reports --out rerun-out/still-failing.txt || true
          STILL=$(wc -l < rerun-out/still-failing.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "STILL_FAILING=${STILL}" >> "$GITHUB_ENV"
          echo "BEFORE_FAILING=${{ needs.summary.outputs.total_failed }}" >> "$GITHUB_ENV"

      # SECOND client report: full suite, with each re-run test's fresh status overriding the original.
      - name: Generate AFTER-RERUN consolidated client report
        if: always()
        env:
          SEND_EMAIL_ENABLED: ${{ inputs.send_email && secrets.EMAIL_PASSWORD != '' && 'true' || 'false' }}
          EMAIL_FROM: "abhiyant.singh@egalvanic.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "abhiyant.singh@egalvanic.com"
          EMAIL_SUBJECT_SUFFIX: " (After Re-run)"
        run: |
          python3 .github/scripts/consolidated-report.py \
            all-reports \
            reports/client-report-rerun/Consolidated_Client_Report_Suite2_AfterRerun.html \
            --rerun-dir rerun-results

      - name: Generate AFTER-RERUN client-ready report
        if: always()
        run: |
          python3 .github/scripts/client-report.py \
            reports/client-report-rerun/Consolidated_Client_Report_Suite2_AfterRerun.html \
            reports/client-report-rerun/Client_Report_Polished_Suite2_AfterRerun.html || true

      - name: Upload AFTER-RERUN client report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-client-report-suite2-after-rerun
          path: |
            reports/client-report-rerun/Consolidated_Client_Report_Suite2_AfterRerun.html
            reports/client-report-rerun/Client_Report_Polished_Suite2_AfterRerun.html
          retention-days: 30
          if-no-files-found: warn

      # AFTER-RERUN consolidated DETAILED report: the original modules (steps + inline
      # screenshots) + an authoritative merged-totals banner (recovered re-run passes
      # counted as PASS), recovered tests re-badged green, and the re-run's own detailed
      # reports appended as "[re-run]" modules.
      - name: Generate AFTER-RERUN consolidated detailed report
        if: always()
        run: |
          python3 .github/scripts/consolidated-detailed-report.py \
            all-reports reports/consolidated-detailed-rerun \
            --title "Consolidated Detailed Report — Parallel Suite 2 AFTER RE-RUN (run ${{ github.run_number }})" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            --rerun-detail reports/detail-report \
            --rerun-results rerun-results || true

      - name: Upload AFTER-RERUN consolidated detailed report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: consolidated-detailed-report-suite2-after-rerun
          path: reports/consolidated-detailed-rerun/
          retention-days: 30
          if-no-files-found: warn

      - name: Re-run summary
        if: always()
        run: |
          {
            echo "## Parallel Suite 2 — Re-run of failed tests"
            echo ""
            echo "- Failed in first pass: **${BEFORE_FAILING:-?}**"
            echo "- Still failing after re-run: **${STILL_FAILING:-?}** (the rest recovered — env-flaky or fixed)"
            echo ""
            echo "Reports attached to this run:"
            echo "- \`consolidated-client-report-suite2\` — client report **before** re-run"
            echo "- \`consolidated-client-report-suite2-after-rerun\` — client report **after** re-run (merged totals)"
            echo "- \`consolidated-detailed-report-suite2\` — detailed report **before** re-run"
            echo "- \`consolidated-detailed-report-suite2-after-rerun\` — detailed report **after** re-run (merged banner + recovered tests re-badged + [re-run] modules)"
          } >> "$GITHUB_STEP_SUMMARY"
