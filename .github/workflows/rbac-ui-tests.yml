name: RBAC UI Gating Tests

# ============================================================
# RBAC UI GATING SUITE  (testng-rbac-ui.xml)
# ------------------------------------------------------------
# Real-browser, per-role verification that the live web app shows each role
# ONLY the nav modules its permissions allow (oracle = live /auth/me; detection
# = sidebar route links). Catches frontend gating mis-wiring an API test can't.
# Needs Chrome. CI runs headless (-Dheadless=true) on the display-less runner —
# local runs are headed. Roles without platform.web must be web-restricted;
# unprovisioned roles SKIP.
# ============================================================
on:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated roles to run (blank = all)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths:
      - 'src/test/java/com/egalvanic/qa/testcase/RolePermissionUiGatingTest.java'
      - 'src/test/java/com/egalvanic/qa/testcase/api/RbacFixtures.java'
      - 'testng-rbac-ui.xml'
      - '.github/workflows/rbac-ui-tests.yml'

jobs:
  rbac-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn -B -q compile test-compile

      - name: Run RBAC UI gating suite (headless)
        id: ui_run
        continue-on-error: true
        env:
          ROLES_FILTER: ${{ github.event.inputs.roles }}
        run: |
          # Quote the role filter as a single arg — role names contain spaces ("Client Portal").
          # $ROLES_FILTER is an env var (safe: not GHA-interpolated into the command).
          if [ -n "$ROLES_FILTER" ]; then
            mvn -B test -DsuiteXmlFile=testng-rbac-ui.xml -Dheadless=true -DSEND_EMAIL_ENABLED=false "-Drbac.ui.roles=$ROLES_FILTER"
          else
            mvn -B test -DsuiteXmlFile=testng-rbac-ui.xml -Dheadless=true -DSEND_EMAIL_ENABLED=false
          fi

      - name: Summarize results + list failing test cases
        if: always()
        run: |
          R=$(find target/surefire-reports -name 'testng-results.xml' | head -1)
          echo "## RBAC UI Gating Suite" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$R" ] || [ ! -f "$R" ]; then
            echo "No testng-results.xml found." >> "$GITHUB_STEP_SUMMARY"
            echo "NO_RESULTS=1" >> "$GITHUB_ENV"; exit 0
          fi
          PASS=$(grep -oE '<testng-results[^>]*passed="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
          FAIL=$(grep -oE '<testng-results[^>]*failed="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
          SKIP=$(grep -oE '<testng-results[^>]*skipped="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
          : "${PASS:=0}"; : "${FAIL:=0}"; : "${SKIP:=0}"
          echo "FAIL_COUNT=$FAIL" >> "$GITHUB_ENV"
          {
            echo ""
            echo "| Result | Count |"; echo "|--------|------:|"
            echo "| ✅ Passed | $PASS |"; echo "| ❌ Failed | $FAIL |"; echo "| ⏭️ Skipped | $SKIP |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$FAIL" != "0" ]; then
            echo "### ❌ Failing roles + gating mismatches" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -rhoE 'UI gating mismatch for[^<]*|should be (HIDDEN|VISIBLE)[^<]*' target/surefire-reports/*.txt 2>/dev/null \
              | sort -u | head -60 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ No gating mismatches" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports + screenshots
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rbac-ui-reports
          path: |
            target/surefire-reports/
            reports/detail-report/
            test-output/screenshots/
          retention-days: 14

      - name: Fail job if any UI gating test failed
        if: always()
        run: |
          if [ "${NO_RESULTS:-0}" = "1" ]; then echo "::error::RBAC UI suite produced no results"; exit 1; fi
          if [ "${FAIL_COUNT:-0}" != "0" ]; then
            echo "::error::${FAIL_COUNT} RBAC UI gating test(s) failed — see the run summary"; exit 1
          fi
          echo "All RBAC UI gating tests passed (skips expected for unprovisioned roles)."
