name: Smoke Tests - Asset & Location CRUD

on:
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Create output directories
        run: |
          mkdir -p test-output/reports
          mkdir -p test-output/screenshots
          mkdir -p reports/detailed
          mkdir -p reports/client

      - name: Run Smoke Tests
        run: |
          mvn clean test \
            -DsuiteXmlFile=smoke-testng.xml \
            -Dheadless=true \
            -Dmaven.test.failure.ignore=true
        env:
          DISPLAY: ':99'

      - name: Upload Detailed Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detailed-test-reports
          path: |
            reports/detailed/
            test-output/screenshots/
          retention-days: 30

      - name: Upload Client Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-reports
          path: reports/client/
          retention-days: 30

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Test Summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f target/surefire-reports/testng-results.xml ]; then
            TOTAL=$(grep -o 'total="[0-9]*"' target/surefire-reports/testng-results.xml | head -1 | grep -o '[0-9]*')
            PASSED=$(grep -o 'passed="[0-9]*"' target/surefire-reports/testng-results.xml | head -1 | grep -o '[0-9]*')
            FAILED=$(grep -o 'failed="[0-9]*"' target/surefire-reports/testng-results.xml | head -1 | grep -o '[0-9]*')
            SKIPPED=$(grep -o 'skipped="[0-9]*"' target/surefire-reports/testng-results.xml | head -1 | grep -o '[0-9]*')

            echo "| Metric  | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total   | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed  | ${PASSED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed  | ${FAILED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Skipped | ${SKIPPED:-0} |" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Reports" >> $GITHUB_STEP_SUMMARY
            echo "- **Detailed Report** (QA Team): Download from \`detailed-test-reports\` artifact" >> $GITHUB_STEP_SUMMARY
            echo "- **Client Report** (Presentation): Download from \`client-test-reports\` artifact" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi
