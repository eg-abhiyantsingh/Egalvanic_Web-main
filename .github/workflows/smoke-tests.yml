name: Smoke Tests — Quick Critical Path (34 TCs)

# ============================================================
# WEB SMOKE TEST SUITE - Quick Critical Path Validation
# ============================================================
# Tests: 34 tests across 6 modules
# (Connection CRUD excluded — module hidden in May 2026 web release)
#
# Modules:
#   Module 1: Auth & Login      (6 tests) — Admin → PM → Technician → FM → Client Portal → Invalid
#   Module 2: Site Selection    (4 tests) — Selector Present → Dropdown → Select Site → Context Persists
#   Module 3: Asset CRUD        (9 tests) — Create → Read → Update → OCP → Detail → Search → EditCancel → Lifecycle → Delete
#   Module 4: Location CRUD     (4 tests) — Create Hierarchy → Read → Update → Delete
#   Module 5: Issues CRUD       (5 tests) — Create → Search → ActivateJobs → Photos → Delete
#   Module 6: Work Order CRUD   (6 tests) — Create → Edit → IRPhotos → Locations → Tasks → Filter
#
# Per-module TestNG XMLs:
#   smoke-auth-testng.xml
#   smoke-site-testng.xml
#   smoke-asset-testng.xml
#   smoke-location-testng.xml
#   smoke-issues-testng.xml
#   smoke-workorder-testng.xml
#
# Dashboard script: .github/scripts/smoke-dashboard.sh
# ============================================================
on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Select module to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - site-selection
          - asset
          - location
          - issues
          - workorder

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      # ============================================================
      # Environment Setup
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ============================================================
      # Pre-flight: Download dependencies quietly
      # ============================================================
      - name: Download dependencies
        run: |
          echo "Downloading Maven dependencies..."
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true
          echo "✅ Dependencies ready"

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p reports/detail-report
          mkdir -p reports/client-report
          mkdir -p reports/modules

      # ============================================================
      # Compile (quiet — only show errors)
      # ============================================================
      - name: Compile project
        run: |
          echo "Compiling project..."
          mvn compile test-compile -B -q
          echo "✅ Compilation successful"

      # ============================================================
      # Run Smoke Tests — Module-by-Module with Dashboard
      # ============================================================
      - name: Run Smoke Tests with Dashboard
        id: smoke_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          SMOKE_MODULE: ${{ github.event.inputs.module }}
        run: |
          bash .github/scripts/smoke-dashboard.sh

      # ============================================================
      # Test Summary (GitHub Actions step summary)
      # ============================================================
      - name: Test Summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$SMOKE_PASSED" ]; then
            if [ "$SMOKE_RESULT" = "passed" ]; then
              echo "### ALL TESTS PASSED" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$SMOKE_RESULT" = "failed" ]; then
              echo "### ALL TESTS FAILED" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### SOME TESTS FAILED" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Total | $SMOKE_TOTAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passed | $SMOKE_PASSED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failed | $SMOKE_FAILED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped | $SMOKE_SKIPPED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Duration | ${SMOKE_DURATION}s |" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Reports" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Detailed Report**: Download from \`detailed-test-reports\` artifact" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Client Report**: Download from \`client-test-reports\` artifact" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test results available." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ============================================================
      # Upload Artifacts (reports + screenshots)
      # ============================================================
      - name: Upload Detailed Reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: detailed-test-reports
          path: |
            reports/detail-report/
            test-output/screenshots/
            reports/modules/
          retention-days: 30

      - name: Upload Client Reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: client-test-reports
          path: reports/client-report/
          retention-days: 30

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/
            reports/modules/
          retention-days: 14

      # ============================================================
      # Final Status
      # ============================================================
      - name: Check smoke test result
        if: always()
        run: |
          if [ "$SMOKE_RESULT" = "failed" ]; then
            echo "All smoke tests failed"
            exit 1
          elif [ "$SMOKE_RESULT" = "partial" ]; then
            echo "Some tests failed ($SMOKE_PASSED/$SMOKE_TOTAL passed) — check reports"
          elif [ "$SMOKE_RESULT" = "passed" ]; then
            echo "All smoke tests passed"
          else
            echo "Smoke test result unknown — check logs"
            exit 1
          fi
