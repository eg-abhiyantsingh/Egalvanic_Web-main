name: Full Test Suite — All Modules (1,057 TCs)

# ============================================================
# FULL TEST SUITE — Sequential Dashboard Execution
# ============================================================
# Total: 1,057 tests across 10 groups
#
# Groups:
#   Group  1: Auth + Site + Connection    (152 TCs)
#   Group  2: Location + Task             (135 TCs)
#   Group  3: Work Order + Issue          (234 TCs)
#   Group  4: Asset Parts 1-2             ( 69 TCs)
#   Group  5: Asset Part 3               ( 76 TCs)
#   Group  6: Asset Parts 4-5            (141 TCs)
#   Group  7: SLD                        ( 71 TCs)
#   Group  8: Dashboard + BugHunt        (105 TCs)
#   Group  9: Load + API                 ( 37 TCs)
#   Group 10: Smoke Suites               ( 37 TCs)
#
# Dashboard script: .github/scripts/full-suite-dashboard.sh
# ============================================================
on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Select group to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth-site-connection
          - location-task
          - workorder-issue
          - asset-1-2
          - asset-3
          - asset-4-5
          - sld
          - dashboard-bughunt
          - load-api
          - smoke
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2:00 AM UTC

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ============================================================
      # Environment Setup
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ============================================================
      # Pre-flight: Download dependencies quietly
      # ============================================================
      - name: Download dependencies
        run: |
          echo "Downloading Maven dependencies..."
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true
          echo "Dependencies ready"

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p reports/detail-report
          mkdir -p reports/client-report
          mkdir -p reports/groups

      # ============================================================
      # Compile (quiet — only show errors)
      # ============================================================
      - name: Compile project
        run: |
          echo "Compiling project..."
          mvn compile test-compile -B -q
          echo "Compilation successful"

      # ============================================================
      # Run Full Suite — Group-by-Group with Dashboard
      # ============================================================
      - name: Run Full Suite with Dashboard
        id: full_suite
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          FULL_SUITE_GROUP: ${{ github.event.inputs.group || 'all' }}
        run: |
          bash .github/scripts/full-suite-dashboard.sh

      # ============================================================
      # Test Summary (GitHub Actions step summary)
      # ============================================================
      - name: Test Summary
        if: always()
        run: |
          echo "## Full Test Suite Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$SUITE_PASSED" ]; then
            if [ "$SUITE_RESULT" = "passed" ]; then
              echo "### ALL TESTS PASSED" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$SUITE_RESULT" = "failed" ]; then
              echo "### ALL TESTS FAILED" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### SOME TESTS FAILED" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Total | $SUITE_TOTAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passed | $SUITE_PASSED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failed | $SUITE_FAILED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped | $SUITE_SKIPPED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Duration | ${SUITE_DURATION}s |" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Reports" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Detailed Report**: Download from \`detailed-test-reports\` artifact" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Client Report**: Download from \`client-test-reports\` artifact" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test results available." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ============================================================
      # Upload Artifacts (reports + screenshots)
      # ============================================================
      - name: Upload Detailed Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detailed-test-reports
          path: |
            reports/detail-report/
            test-output/screenshots/
            reports/groups/
          retention-days: 30

      - name: Upload Client Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-reports
          path: reports/client-report/
          retention-days: 30

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/
            reports/groups/
          retention-days: 14

      # ============================================================
      # Final Status
      # ============================================================
      - name: Check full suite result
        if: always()
        run: |
          if [ "$SUITE_RESULT" = "failed" ]; then
            echo "All tests failed"
            exit 1
          elif [ "$SUITE_RESULT" = "partial" ]; then
            echo "Some tests failed ($SUITE_PASSED/$SUITE_TOTAL passed) -- check reports"
          elif [ "$SUITE_RESULT" = "passed" ]; then
            echo "All tests passed"
          else
            echo "Suite result unknown -- check logs"
            exit 1
          fi
