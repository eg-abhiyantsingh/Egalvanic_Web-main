name: Full Test Suite — All Modules (674 TCs)

# ============================================================
# FULL TEST SUITE — Parallel Execution Across 8 Groups
# ============================================================
# Total: 674 tests across 18 test classes
#
# Groups (run in parallel):
#   Group 1: Auth + Site Selection + Connection   (109 TCs)
#   Group 2: Location + Task                      ( 93 TCs)
#   Group 3: Work Order + Issue                   ( 94 TCs)
#   Group 4: Asset Parts 1-2                      ( 69 TCs)
#   Group 5: Asset Part 3                         ( 76 TCs)
#   Group 6: Asset Parts 4-5                      (141 TCs)
#   Group 7: Dashboard + BugHunt                  ( 75 TCs)
#   Group 8: API Tests                            ( 17 TCs)
#
# Each group runs in its own job with a fresh browser session.
# Wall-clock time: ~30 min (parallel) vs ~90 min (sequential)
# ============================================================

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Which group to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'auth-site-connection'
          - 'location-task'
          - 'workorder-issue'
          - 'asset-1-2'
          - 'asset-3'
          - 'asset-4-5'
          - 'dashboard-bughunt'
          - 'api'
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2:00 AM UTC

jobs:
  # ============================================================
  # TEST JOBS — Parallel Matrix (runs when 'all' or scheduled)
  # ============================================================
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.group == 'all' ||
      github.event.inputs.group == ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: auth-site-connection
            xml: suite-auth-site-connection.xml
            name: "Auth + Site Selection + Connection"
            tests: 109
          - group: location-task
            xml: suite-location-task.xml
            name: "Location + Task"
            tests: 93
          - group: workorder-issue
            xml: suite-workorder-issue.xml
            name: "Work Order + Issue"
            tests: 94
          - group: asset-1-2
            xml: suite-asset-1-2.xml
            name: "Asset Parts 1-2"
            tests: 69
          - group: asset-3
            xml: suite-asset-3.xml
            name: "Asset Part 3"
            tests: 76
          - group: asset-4-5
            xml: suite-asset-4-5.xml
            name: "Asset Parts 4-5"
            tests: 141
          - group: dashboard-bughunt
            xml: suite-dashboard-bughunt.xml
            name: "Dashboard + BugHunt"
            tests: 75
          - group: api
            xml: suite-api.xml
            name: "API Tests"
            tests: 17

    name: "${{ matrix.name }} (${{ matrix.tests }} TCs)"

    steps:
      # ── Environment Setup ──
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: |
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p reports/detail-report
          mkdir -p reports/client-report

      - name: Compile project
        run: mvn compile test-compile -B -q

      # ── Run Tests ──
      - name: Run tests
        id: run_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          SUITE_NAME: ${{ matrix.name }}
          SUITE_XML: ${{ matrix.xml }}
          SUITE_TESTS: ${{ matrix.tests }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Running: $SUITE_NAME ($SUITE_TESTS TCs)"
          echo "║  Suite:   $SUITE_XML"
          echo "║  Browser: Chrome (headless)"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          START_TIME=$(date +%s)

          mvn test -B \
            -DsuiteXmlFile="$SUITE_XML" \
            -Dheadless=true \
            2>&1 | tee test-output/run.log

          MVN_EXIT=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "DURATION=${DURATION}" >> "$GITHUB_ENV"
          echo "MVN_EXIT=${MVN_EXIT}" >> "$GITHUB_ENV"

          exit $MVN_EXIT

      # ── Per-Group Summary ──
      - name: Group summary
        if: always()
        env:
          GROUP_NAME: ${{ matrix.name }}
          GROUP_EXPECTED: ${{ matrix.tests }}
          GROUP_ID: ${{ matrix.group }}
        run: |
          PASSED=0; FAILED=0; SKIPPED=0
          RESULTS_XML="target/surefire-reports/testng-results.xml"
          if [ -f "$RESULTS_XML" ]; then
            PASSED=$(sed -n 's/.*passed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
            FAILED=$(sed -n 's/.*failed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
            SKIPPED=$(sed -n 's/.*skipped="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
          fi

          echo "## $GROUP_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${MVN_EXIT:-1}" = "0" ]; then
            echo "### PASSED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### FAILURES DETECTED" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected | $GROUP_EXPECTED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | ${PASSED:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | ${FAILED:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped | ${SKIPPED:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | ${DURATION:-0}s |" >> "$GITHUB_STEP_SUMMARY"

          # Save for summary job
          mkdir -p results
          cat > "results/${GROUP_ID}.json" <<EOJSON
          {
            "group": "$GROUP_ID",
            "name": "$GROUP_NAME",
            "expected": $GROUP_EXPECTED,
            "passed": ${PASSED:-0},
            "failed": ${FAILED:-0},
            "skipped": ${SKIPPED:-0},
            "duration": ${DURATION:-0},
            "exit_code": ${MVN_EXIT:-1}
          }
          EOJSON

      # ── Upload Artifacts ──
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.group }}
          path: |
            reports/detail-report/
            reports/client-report/
            test-output/screenshots/
            target/surefire-reports/
          retention-days: 30

      - name: Upload results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.group }}
          path: results/
          retention-days: 7

  # ============================================================
  # SINGLE GROUP JOB — When a specific group is selected
  # ============================================================
  test-single:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.group != 'all' &&
      github.event.inputs.group != ''

    name: "Run: ${{ github.event.inputs.group }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: |
          mvn dependency:resolve -B -q 2>/dev/null || true
          mvn dependency:resolve-plugins -B -q 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p test-output/screenshots
          mkdir -p reports/detail-report
          mkdir -p reports/client-report

      - name: Compile project
        run: mvn compile test-compile -B -q

      - name: Resolve suite XML
        id: resolve
        env:
          SELECTED_GROUP: ${{ github.event.inputs.group }}
        run: |
          case "$SELECTED_GROUP" in
            auth-site-connection) XML="suite-auth-site-connection.xml"; NAME="Auth + Site Selection + Connection"; TESTS=109 ;;
            location-task)        XML="suite-location-task.xml"; NAME="Location + Task"; TESTS=93 ;;
            workorder-issue)      XML="suite-workorder-issue.xml"; NAME="Work Order + Issue"; TESTS=94 ;;
            asset-1-2)            XML="suite-asset-1-2.xml"; NAME="Asset Parts 1-2"; TESTS=69 ;;
            asset-3)              XML="suite-asset-3.xml"; NAME="Asset Part 3"; TESTS=76 ;;
            asset-4-5)            XML="suite-asset-4-5.xml"; NAME="Asset Parts 4-5"; TESTS=141 ;;
            dashboard-bughunt)    XML="suite-dashboard-bughunt.xml"; NAME="Dashboard + BugHunt"; TESTS=75 ;;
            api)                  XML="suite-api.xml"; NAME="API Tests"; TESTS=17 ;;
            *)                    echo "Unknown group: $SELECTED_GROUP"; exit 1 ;;
          esac
          echo "xml=$XML" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: run_tests
        continue-on-error: true
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SEND_EMAIL_ENABLED: "false"
          SUITE_XML: ${{ steps.resolve.outputs.xml }}
          SUITE_NAME: ${{ steps.resolve.outputs.name }}
          SUITE_TESTS: ${{ steps.resolve.outputs.tests }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Running: $SUITE_NAME ($SUITE_TESTS TCs)"
          echo "║  Suite:   $SUITE_XML"
          echo "║  Browser: Chrome (headless)"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          mvn test -B \
            -DsuiteXmlFile="$SUITE_XML" \
            -Dheadless=true

      - name: Test Summary
        if: always()
        env:
          SUITE_NAME: ${{ steps.resolve.outputs.name }}
          SUITE_TESTS: ${{ steps.resolve.outputs.tests }}
        run: |
          echo "## $SUITE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_XML="target/surefire-reports/testng-results.xml"
          if [ -f "$RESULTS_XML" ]; then
            PASSED=$(sed -n 's/.*passed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
            FAILED=$(sed -n 's/.*failed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
            SKIPPED=$(sed -n 's/.*skipped="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)

            if [ "${FAILED:-0}" = "0" ]; then
              echo "### ALL TESTS PASSED" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### FAILURES DETECTED" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Expected | $SUITE_TESTS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passed | ${PASSED:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failed | ${FAILED:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped | ${SKIPPED:-0} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test results available." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.event.inputs.group }}
          path: |
            reports/detail-report/
            reports/client-report/
            test-output/screenshots/
            target/surefire-reports/
          retention-days: 30

      - name: Check result
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "Tests failed"
            exit 1
          else
            echo "Tests passed"
          fi

  # ============================================================
  # SUMMARY JOB — Aggregates all parallel group results
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      always() &&
      (github.event_name == 'schedule' || github.event.inputs.group == 'all' || github.event.inputs.group == '')
    name: "Full Suite Summary"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results/
          merge-multiple: true

      - name: Generate summary
        run: bash .github/scripts/full-suite-summary.sh

      - name: Check overall result
        run: |
          TOTAL_FAILED=0
          for f in all-results/*.json; do
            [ -f "$f" ] || continue
            FAILED=$(sed -n 's/.*"failed": \([0-9]*\).*/\1/p' "$f")
            EXIT=$(sed -n 's/.*"exit_code": \([0-9]*\).*/\1/p' "$f")
            TOTAL_FAILED=$((TOTAL_FAILED + ${FAILED:-0}))
            if [ "${EXIT:-1}" -ne 0 ] && [ "${FAILED:-0}" -eq 0 ]; then
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
            fi
          done

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "Full suite has failures ($TOTAL_FAILED failed)"
            exit 1
          else
            echo "Full suite passed — all 674 tests green"
          fi
