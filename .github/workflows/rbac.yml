name: RBAC (manual run — pick scope + role)

# ============================================================
# One-click RBAC runner. Pick WHAT to run (scope) and WHICH role from the dropdowns:
#   scope: all | api | ui | login
#   role:  all | Admin | Project Manager | Technician | Facility Manager | Account Manager | Client Portal
# Maps to the right suite XML and passes -Drbac.roles for the chosen role.
# (The push-triggered rbac-tests.yml / rbac-ui-tests.yml / rbac-login-tests.yml still run on commits.)
# ============================================================
on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ui
          - login
      role:
        description: 'Which role'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - Admin
          - Project Manager
          - Technician
          - Facility Manager
          - Account Manager
          - Client Portal

jobs:
  rbac:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn -B -q compile test-compile

      - name: Run RBAC (scope=${{ github.event.inputs.scope }}, role=${{ github.event.inputs.role }})
        id: run
        continue-on-error: true
        env:
          SCOPE: ${{ github.event.inputs.scope }}
          ROLE: ${{ github.event.inputs.role }}
        run: |
          # Map the scope dropdown to a suite file.
          case "$SCOPE" in
            api)   SUITE=testng-rbac-permissions.xml ;;
            ui)    SUITE=testng-rbac-ui.xml ;;
            login) SUITE=testng-rbac-login.xml ;;
            *)     SUITE=testng-rbac-all.xml ;;
          esac
          echo "Suite: $SUITE | Role: $ROLE"
          # Build args as an array so a role name with a space ("Project Manager") stays one arg.
          # SCOPE/ROLE are env vars (not interpolated into the command) — injection-safe.
          ARGS=( -B test -DsuiteXmlFile="$SUITE" -Dheadless=true -DSEND_EMAIL_ENABLED=false )
          if [ -n "$ROLE" ] && [ "$ROLE" != "all" ]; then ARGS+=( "-Drbac.roles=$ROLE" ); fi
          mvn "${ARGS[@]}"

      - name: Summarize results
        if: always()
        run: |
          echo "## RBAC run — scope=${SCOPE:-all}, role=${ROLE:-all}" >> "$GITHUB_STEP_SUMMARY"
          FILES=$(find target/surefire-reports -name 'testng-results.xml')
          if [ -z "$FILES" ]; then echo "No results produced." >> "$GITHUB_STEP_SUMMARY"; echo "NO_RESULTS=1" >> "$GITHUB_ENV"; exit 0; fi
          PASS=0; FAIL=0; SKIP=0
          for R in $FILES; do
            p=$(grep -oE '<testng-results[^>]*passed="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
            q=$(grep -oE '<testng-results[^>]*failed="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
            s=$(grep -oE '<testng-results[^>]*skipped="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
            PASS=$((PASS+${p:-0})); FAIL=$((FAIL+${q:-0})); SKIP=$((SKIP+${s:-0}))
          done
          echo "FAIL_COUNT=$FAIL" >> "$GITHUB_ENV"
          { echo ""; echo "| Result | Count |"; echo "|--------|------:|";
            echo "| ✅ Passed | $PASS |"; echo "| ❌ Failed | $FAIL |"; echo "| ⏭️ Skipped | $SKIP |"; echo ""; } >> "$GITHUB_STEP_SUMMARY"
          if [ "$FAIL" != "0" ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -rhoE '<test-method status="FAIL"[^>]*name="[^"]*"' $FILES | grep -oE 'name="[^"]*"' | sed -E 's/name="(.*)"/- \1/' | sort -u >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          SCOPE: ${{ github.event.inputs.scope }}
          ROLE: ${{ github.event.inputs.role }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rbac-${{ github.event.inputs.scope }}-${{ github.event.inputs.role }}-reports
          path: |
            target/surefire-reports/
            reports/detail-report/
            test-output/screenshots/
          retention-days: 14

      - name: Fail job if any test failed
        if: always()
        run: |
          if [ "${{ steps.run.outcome }}" = "failure" ]; then echo "::error::Maven reported test failures"; exit 1; fi
          if [ "${NO_RESULTS:-0}" = "1" ]; then echo "::error::no results produced"; exit 1; fi
          if [ "${FAIL_COUNT:-0}" != "0" ]; then echo "::error::${FAIL_COUNT} test(s) failed"; exit 1; fi
          echo "RBAC run passed (skips expected for unprovisioned/mis-provisioned roles)."
