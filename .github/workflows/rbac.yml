name: RBAC (manual run — pick what to run)

# ============================================================
# One-click RBAC runner. Pick a single option from the "Which RBAC to run" dropdown.
# Each option maps to a suite / test class / per-role filter. (The push-triggered
# rbac-tests.yml / rbac-ui-tests.yml / rbac-login-tests.yml still run on commits.)
# ============================================================
on:
  workflow_dispatch:
    inputs:
      which:
        description: 'Which RBAC to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all                                       # everything (master suite)
          - api-all                                   # all API (no browser)
          - ui-all                                    # all UI (nav gating + work-order edit)
          - login-e2e                                 # full login journey (all roles)
          - permission-contract                       # /auth/me set == matrix, per role
          - permission-matrix-cells                   # 791 role×permission cells
          - workorder-edit-enforcement                # PUT /job/{id} allowed iff jobs.manage
          - action-enforcement-create-edit            # create/edit Asset/Task/Issue per role (gate probe)
          - crud-contract                             # REAL create→edit→delete lifecycle + 200-async contract
          - nav-gating-ui                             # per-role nav visibility (browser)
          - workorder-edit-ui                         # PM reaches work-order edit (browser)
          - role-project-manager                      # ALL RBAC, Project Manager only
          - role-technician                           # ALL RBAC, Technician only
          - role-facility-manager                     # ALL RBAC, Facility Manager only
          - role-account-manager                      # ALL RBAC, Account Manager only
          - role-client-portal                        # ALL RBAC, Client Portal only
          - role-admin                                # ALL RBAC, Admin only (force mis-provisioned acct)

jobs:
  rbac:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          chrome-version: 'stable'

      - name: Cache Maven dependencies
        uses: actions/cache@v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn -B -q compile test-compile

      - name: Run RBAC (${{ github.event.inputs.which }})
        id: run
        continue-on-error: true
        env:
          WHICH: ${{ github.event.inputs.which }}
        run: |
          # Map the single dropdown choice to Maven args. WHICH is an env var (a constrained choice
          # value, not interpolated into the command) — injection-safe. Array keeps "Project Manager"
          # as one arg. Defaults to headless + no email; suite/class/role added per choice.
          # The pom always feeds a suiteXmlFile to surefire, so EVERY option maps to a suite
          # (a -Dtest= class filter would be ignored). Single-slice suites are tiny one-class files.
          ARGS=( -B test -Dheadless=true -DSEND_EMAIL_ENABLED=false )
          case "$WHICH" in
            api-all)                        ARGS+=( -DsuiteXmlFile=testng-rbac-permissions.xml ) ;;
            ui-all)                         ARGS+=( -DsuiteXmlFile=testng-rbac-ui.xml ) ;;
            login-e2e)                      ARGS+=( -DsuiteXmlFile=testng-rbac-login.xml ) ;;
            permission-contract)            ARGS+=( -DsuiteXmlFile=testng-rbac-contract.xml ) ;;
            permission-matrix-cells)        ARGS+=( -DsuiteXmlFile=testng-rbac-cells.xml ) ;;
            workorder-edit-enforcement)     ARGS+=( -DsuiteXmlFile=testng-rbac-workorder-api.xml ) ;;
            action-enforcement-create-edit) ARGS+=( -DsuiteXmlFile=testng-rbac-actions.xml ) ;;
            crud-contract)                  ARGS+=( -DsuiteXmlFile=testng-rbac-crud.xml ) ;;
            nav-gating-ui)                  ARGS+=( -DsuiteXmlFile=testng-rbac-nav-ui.xml ) ;;
            workorder-edit-ui)              ARGS+=( -DsuiteXmlFile=testng-rbac-workorder-ui.xml ) ;;
            role-project-manager)           ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml "-Drbac.roles=Project Manager" ) ;;
            role-technician)                ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml "-Drbac.roles=Technician" ) ;;
            role-facility-manager)          ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml "-Drbac.roles=Facility Manager" ) ;;
            role-account-manager)           ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml "-Drbac.roles=Account Manager" ) ;;
            role-client-portal)             ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml "-Drbac.roles=Client Portal" ) ;;
            role-admin)                     ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml "-Drbac.roles=Admin" ) ;;
            *)                              ARGS+=( -DsuiteXmlFile=testng-rbac-all.xml ) ;;  # all
          esac
          echo "Running: mvn ${ARGS[*]}"
          mvn "${ARGS[@]}"

      - name: Summarize results
        if: always()
        run: |
          echo "## RBAC run — ${WHICH:-all}" >> "$GITHUB_STEP_SUMMARY"
          FILES=$(find target/surefire-reports -name 'testng-results.xml')
          if [ -z "$FILES" ]; then echo "No results produced." >> "$GITHUB_STEP_SUMMARY"; echo "NO_RESULTS=1" >> "$GITHUB_ENV"; exit 0; fi
          PASS=0; FAIL=0; SKIP=0
          for R in $FILES; do
            p=$(grep -oE '<testng-results[^>]*passed="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
            q=$(grep -oE '<testng-results[^>]*failed="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
            s=$(grep -oE '<testng-results[^>]*skipped="[0-9]+"' "$R" | grep -oE '[0-9]+' | head -1)
            PASS=$((PASS+${p:-0})); FAIL=$((FAIL+${q:-0})); SKIP=$((SKIP+${s:-0}))
          done
          echo "FAIL_COUNT=$FAIL" >> "$GITHUB_ENV"
          { echo ""; echo "| Result | Count |"; echo "|--------|------:|";
            echo "| ✅ Passed | $PASS |"; echo "| ❌ Failed | $FAIL |"; echo "| ⏭️ Skipped | $SKIP |"; echo ""; } >> "$GITHUB_STEP_SUMMARY"
          if [ "$FAIL" != "0" ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -rhoE '<test-method status="FAIL"[^>]*name="[^"]*"' $FILES | grep -oE 'name="[^"]*"' | sed -E 's/name="(.*)"/- \1/' | sort -u >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          WHICH: ${{ github.event.inputs.which }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rbac-${{ github.event.inputs.which }}-reports
          path: |
            target/surefire-reports/
            reports/detail-report/
            test-output/screenshots/
          retention-days: 14

      - name: Fail job if any test failed
        if: always()
        run: |
          if [ "${{ steps.run.outcome }}" = "failure" ]; then echo "::error::Maven reported test failures"; exit 1; fi
          if [ "${NO_RESULTS:-0}" = "1" ]; then echo "::error::no results produced"; exit 1; fi
          if [ "${FAIL_COUNT:-0}" != "0" ]; then echo "::error::${FAIL_COUNT} test(s) failed"; exit 1; fi
          echo "RBAC run passed (skips expected for unprovisioned/mis-provisioned roles)."
